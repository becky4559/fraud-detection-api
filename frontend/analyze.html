<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogSense - Forensic Analysis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f5f5f5; display: flex; }
        .sidebar { width: 250px; background: #1a1a1a; color: white; height: 100vh; position: fixed; padding: 20px; }
        .main { flex: 1; margin-left: 250px; padding: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .signal-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        .bg-red { background: #fee; color: #c00; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LOGSENSE</h2><br>
        <a href="/dashboard" style="color: #ccc; text-decoration: none;">← Back to Dashboard</a>
    </div>
    <div class="main">
        <h1>Forensic Investigation</h1>
        <p id="caseId" style="color: #666; margin-bottom: 20px;">Loading case...</p>

        <div class="grid">
            <div class="card">
                <h3>Transaction Details</h3><br>
                <div class="signal-item"><span>User</span> <strong id="userName">-</strong></div>
                <div class="signal-item"><span>Amount</span> <strong id="amount">-</strong></div>
                <div class="signal-item"><span>Recipient</span> <strong id="recipient">-</strong></div>
                <div class="signal-item"><span>Risk Level</span> <span id="riskLevel" class="badge bg-red">-</span></div>
            </div>

            <div class="card">
                <h3>AI Detection Signals</h3><br>
                <div id="signalList">
                    </div>
            </div>
        </div>
    </div>

    <script>
        async function loadAnalysis() {
            const params = new URLSearchParams(window.location.search);
            const alertId = params.get('id');

            if (!alertId) {
                document.body.innerHTML = "<h1>Error: No Alert ID provided. Go back to Alerts and click 'Analyze'.</h1>";
                return;
            }

            try {
                const response = await fetch(`/api/v2/alerts/${alertId}`);
                if (!response.ok) throw new Error("Not found");
                const data = await response.json();

                document.getElementById('caseId').textContent = "Case ID: " + data.transaction_id;
                document.getElementById('userName').textContent = data.user_name;
                document.getElementById('amount').textContent = "KES " + data.amount.toLocaleString();
                document.getElementById('recipient').textContent = data.recipient;
                document.getElementById('riskLevel').textContent = data.risk_level;

                const signals = JSON.parse(data.detection_signals);
                const signalDiv = document.getElementById('signalList');
                
                let signalHtml = '';
                // Loop through explanations provided by the Python engine
                signals.explanations.forEach(text => {
                    signalHtml += `<div class="signal-item" style="color: #d32f2f;">⚠️ ${text}</div>`;
                });
                signalDiv.innerHTML = signalHtml;

            } catch (err) {
                document.body.innerHTML = "<h1>Details Not Found. Ensure the ID is correct.</h1>";
            }
        }
        window.onload = loadAnalysis;
    </script>
</body>
</html>
