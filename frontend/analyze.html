<script>
        // 1. Expanded Fraud Types for Kenya
        const fraudTypeNames = {
            'SIM_SWAP': { name: 'SIM Swap', icon: '📱', color: '#c00', bg: '#fee' },
            'IDENTITY_THEFT': { name: 'Identity Theft', icon: '👤', color: '#c00', bg: '#fee' },
            'DEVICE_CLONING': { name: 'Device Cloning', icon: '👯', color: '#c00', bg: '#fee' },
            'MOBILE_MONEY_FRAUD': { name: 'Mobile Money Fraud', icon: '💸', color: '#f57c00', bg: '#fff3e0' },
            'AGENT_COLLUSION': { name: 'Agent Collusion', icon: '🤝', color: '#f57c00', bg: '#fff3e0' },
            'SOCIAL_ENGINEERING': { name: 'Social Engineering', icon: '📞', color: '#fbc02d', bg: '#fff9c4' },
            'REPAYMENT_FRAUD': { name: 'Repayment Fraud', icon: '🔄', color: '#fbc02d', bg: '#fff9c4' },
            'SYNTHETIC_IDENTITY': { name: 'Synthetic Identity', icon: '🎭', color: '#c00', bg: '#fee' },
            'WRONG_PIN_ATTEMPT': { name: 'Wrong PIN Attempt', icon: '🔐', color: '#f57c00', bg: '#fff3e0' },
            'RECURRING_FRAUD_PATTERN': { name: 'Repeated Fraud Pattern', icon: '🔁', color: '#c00', bg: '#fee' }
        };

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = '/login';
        }

        async function fetchAlertDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const alertId = urlParams.get('id');

            if (!alertId) {
                document.getElementById('loading').textContent = 'No alert ID specified';
                return;
            }

            try {
                const response = await fetch(`/api/v2/alerts/${alertId}`);
                if (!response.ok) throw new Error('Alert not found');
                const alert = await response.json();
                displayAlert(alert);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Failed to load: ' + error.message;
            }
        }

        function displayAlert(alert) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('alertContent').style.display = 'block';

            const fraudInfo = fraudTypeNames[alert.fraud_type] || 
                { name: alert.fraud_type, icon: '⚠️', color: '#666', bg: '#f0f0f0' };
            
            // Set Header Info
            const badge = document.getElementById('fraudTypeBadge');
            badge.textContent = fraudInfo.name;
            badge.style.backgroundColor = fraudInfo.bg;
            badge.style.color = fraudInfo.color;
            document.getElementById('fraudIcon').textContent = fraudInfo.icon;
            
            // Set Details
            document.getElementById('alertId').textContent = alert.alert_id;
            document.getElementById('userName').textContent = alert.user_name || "Unknown User";
            document.getElementById('userId').textContent = alert.user_id;
            document.getElementById('transactionId').textContent = alert.transaction_id;
            document.getElementById('amount').textContent = 'KES ' + (alert.amount || 0).toLocaleString();
            document.getElementById('recipient').textContent = alert.recipient || 'N/A';
            document.getElementById('location').textContent = alert.location || 'Nairobi, KE';
            document.getElementById('timestamp').textContent = new Date(alert.timestamp).toLocaleString();
            document.getElementById('status').textContent = alert.acknowledged ? 'Reviewed' : 'New';
            
            const riskPercent = Math.round((alert.risk_score || 0) * 100);
            document.getElementById('riskScore').textContent = riskPercent + '%';

            // --- SMART EXPLANATIONS & SIGNALS ---
            const signalsList = document.getElementById('signalsList');
            const explanationList = document.getElementById('explanationList');
            
            let data = alert.detection_signals;
            // Handle if data is string or object
            if (typeof data === 'string') {
                try { data = JSON.parse(data); } catch(e) { data = {}; }
            }

            // 1. Show Explanations (The "Why")
            const explanations = data.explanations || ["Unusual activity detected by the AI engine."];
            explanationList.innerHTML = explanations.map(exp => 
                `<li class="explanation-item"><strong>⚠️ ALERT:</strong> ${exp}</li>`
            ).join('');

            // 2. Show Technical Signals (The "How")
            const signals = data.signals || {};
            if (Object.keys(signals).length > 0) {
                signalsList.innerHTML = Object.entries(signals).map(([key, value]) => `
                    <div class="signal-item signal-${alert.risk_level?.toLowerCase() || 'medium'}">
                        <div class="signal-name">${key.replace(/_/g, ' ').toUpperCase()}</div>
                        <div class="signal-desc">${value}</div>
                    </div>
                `).join('');
            } else {
                signalsList.innerHTML = '<div class="signal-item">Technical metadata summarized in explanation above.</div>';
            }

            if (alert.acknowledged) {
                document.getElementById('markReviewedBtn').disabled = true;
                document.getElementById('markReviewedBtn').textContent = 'Already Reviewed';
            }
        }

        async function markAsReviewed() {
            const urlParams = new URLSearchParams(window.location.search);
            const alertId = urlParams.get('id');
            try {
                const response = await fetch(`/api/v2/alerts/${alertId}/acknowledge`, { method: 'POST' });
                if (response.ok) {
                    alert('Alert cleared from active queue.');
                    location.reload();
                }
            } catch (error) {
                alert('Connection error');
            }
        }

        window.onload = function() {
            // Check login if needed
            fetchAlertDetails();
        };
    </script>
