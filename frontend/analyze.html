<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogSense - Forensic Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; color: #c5c6c7; display: flex; }
        .sidebar { width: 260px; background: #1f2833; height: 100vh; position: fixed; padding: 25px; border-right: 1px solid #45a29e; }
        .sidebar a { display: block; color: #66fcf1; padding: 12px; text-decoration: none; font-size: 14px; margin-bottom: 10px; border: 1px solid transparent; }
        .sidebar a:hover { border: 1px solid #66fcf1; }
        
        .main { flex: 1; margin-left: 260px; padding: 40px; }
        .report-header { border-bottom: 2px solid #45a29e; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: #1f2833; border-radius: 4px; padding: 25px; border: 1px solid #45a29e; }
        .card h3 { color: #66fcf1; font-size: 16px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #0b0c10; font-size: 14px; }
        .label { color: #8892b0; }
        .value { color: #fff; font-weight: bold; }

        .evidence-box { background: #0b0c10; border-left: 4px solid #66fcf1; padding: 15px; margin-bottom: 15px; }
        .evidence-text { font-size: 13px; line-height: 1.6; }
        
        .badge { padding: 5px 15px; border-radius: 2px; font-weight: bold; font-size: 12px; }
        .CRITICAL { background: #ff4c4c; color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: #66fcf1; margin-bottom: 40px;">LOGSENSE AI</h2>
        <a href="/dashboard">← Back to Console</a>
        <a href="/alerts">Alert History</a>
    </div>

    <div class="main">
        <div class="report-header">
            <div>
                <h1 style="color: #fff; font-size: 28px;">Forensic Case File</h1>
                <p id="txnId" style="color: #45a29e; font-family: monospace;"></p>
            </div>
            <div id="riskLevel"></div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Transaction Profile</h3>
                <div class="data-row"><span class="label">User Account</span><span class="value" id="userName">--</span></div>
                <div class="data-row"><span class="label">Amount</span><span class="value" id="amount">--</span></div>
                <div class="data-row"><span class="label">Recipient</span><span class="value" id="recipient">--</span></div>
                <div class="data-row"><span class="label">Node Location</span><span class="value" id="location">--</span></div>
                <div class="data-row"><span class="label">Timestamp</span><span class="value" id="timestamp">--</span></div>
            </div>

            <div class="card">
                <h3>Technical Metadata</h3>
                <div id="techData">
                    </div>
            </div>
        </div>

        <div class="card" style="margin-top: 30px;">
            <h3>AI Detection Evidence & Reasoning</h3>
            <div id="evidenceList">
                </div>
        </div>
    </div>

    <script>
        async function loadInvestigation() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            try {
                const response = await fetch(`/api/v2/alerts/${id}`);
                const data = await response.json();
                const forensics = JSON.parse(data.detection_signals);

                // Populate Header & Profile
                document.getElementById('txnId').innerText = data.transaction_id;
                document.getElementById('userName').innerText = data.user_name;
                document.getElementById('amount').innerText = "KES " + data.amount.toLocaleString();
                document.getElementById('recipient').innerText = data.recipient;
                document.getElementById('location').innerText = data.location;
                document.getElementById('timestamp').innerText = new Date(data.timestamp).toLocaleString();
                document.getElementById('riskLevel').innerHTML = `<span class="badge ${data.risk_level}">${data.risk_level} RISK</span>`;

                // Populate Technical Signals
                document.getElementById('techData').innerHTML = Object.entries(forensics.signals).map(([key, val]) => `
                    <div class="data-row">
                        <span class="label">${key.replace(/_/g, ' ')}</span>
                        <span class="value">${val}</span>
                    </div>
                `).join('');

                // Populate Evidence Explanations
                document.getElementById('evidenceList').innerHTML = forensics.explanations.map(text => `
                    <div class="evidence-box">
                        <p class="evidence-text">● ${text}</p>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Forensic Load Failed:", err);
            }
        }
        window.onload = loadInvestigation;
    </script>
</body>
</html>
