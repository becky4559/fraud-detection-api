<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogSense - Analyze Alert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #333;
        }

        .sidebar-header h2 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            color: white;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #ccc;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 14px;
        }

        .sidebar-nav a:hover {
            background: #333;
            color: white;
        }

        .sidebar-nav a.active {
            background: #333;
            color: white;
            border-left: 3px solid white;
        }

        .sidebar-nav a i {
            width: 24px;
            font-size: 16px;
            margin-right: 12px;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #333;
        }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 0;
        }

        .sidebar-footer a:hover {
            color: white;
        }

        .sidebar-footer a i {
            width: 24px;
            margin-right: 12px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 250px;
            padding: 30px;
        }

        .page-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h1 {
            font-size: 24px;
            color: #333;
            font-weight: 500;
        }

        .back-link {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #1a1a1a;
            text-decoration: underline;
        }

        /* Alert Details Card */
        .alert-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 30px;
            margin-bottom: 20px;
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .alert-id {
            font-size: 18px;
            color: #666;
        }

        .alert-id span {
            color: #1a1a1a;
            font-weight: 600;
        }

        .risk-badge-large {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .risk-critical {
            background: #fee;
            color: #c00;
        }

        .risk-high {
            background: #fff3e0;
            color: #f57c00;
        }

        .risk-medium {
            background: #fff9c4;
            color: #fbc02d;
        }

        .risk-low {
            background: #e8f5e9;
            color: #2e7d32;
        }

        /* Details Grid */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .detail-item {
            padding: 15px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .detail-label {
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #1a1a1a;
            font-size: 16px;
            font-weight: 500;
        }

        .detail-value.large {
            font-size: 24px;
            font-weight: 600;
        }

        /* Detection Signals */
        .signals-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .signals-section h3 {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .signals-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            color: #333;
            white-space: pre-wrap;
            max-height: 200px;
            overflow: auto;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-primary {
            background: #1a1a1a;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-primary:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: #1a1a1a;
            padding: 12px 24px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #c00;
        }

        /* Fraud Explanation */
        .explanation-box {
            background: #fff3e0;
            border-left: 4px solid #f57c00;
            padding: 20px;
            border-radius: 6px;
            margin-top: 20px;
        }

        .explanation-box h4 {
            color: #f57c00;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .explanation-box p {
            color: #333;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>LOGSENSE</h2>
            <p>Fraud Detection</p>
        </div>

        <div class="sidebar-nav">
            <a href="/dashboard">
                <i></i> Dashboard
            </a>
            <a href="/alerts">
                <i></i> Alerts
            </a>
            <a href="/analyze" class="active">
                <i></i> Analyze
            </a>
            <a href="/settings">
                <i></i> Settings
            </a>
        </div>

        <div class="sidebar-footer">
            <a href="#" onclick="logout()">
                <i></i> Logout
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>Analyze Alert</h1>
            <a href="/alerts" class="back-link">← Back to Alerts</a>
        </div>

        <div id="loading" class="loading">Loading alert details...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="alertContent" style="display: none;">
            <div class="alert-card">
                <div class="alert-header">
                    <div class="alert-id">
                        Alert <span id="alertId"></span>
                    </div>
                    <div id="riskBadge" class="risk-badge-large"></div>
                </div>

                <div class="details-grid">
                    <div class="detail-item">
                        <div class="detail-label">Transaction ID</div>
                        <div class="detail-value" id="transactionId"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">User ID</div>
                        <div class="detail-value" id="userId"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Fraud Type</div>
                        <div class="detail-value" id="fraudType"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Risk Score</div>
                        <div class="detail-value large" id="riskScore"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Amount</div>
                        <div class="detail-value" id="amount"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Location</div>
                        <div class="detail-value" id="location"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Timestamp</div>
                        <div class="detail-value" id="timestamp"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Status</div>
                        <div class="detail-value" id="status"></div>
                    </div>
                </div>

                <div class="explanation-box" id="explanationBox">
                    <h4>Why this was flagged</h4>
                    <p id="explanation"></p>
                </div>

                <div class="signals-section">
                    <h3>Detection Signals</h3>
                    <div id="signals" class="signals-box"></div>
                </div>

                <div class="action-buttons">
                    <button id="markReviewedBtn" class="btn-primary" onclick="markAsReviewed()">Mark as Reviewed</button>
                    <button class="btn-secondary" onclick="window.location.href='/alerts'">Back to Alerts</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fraudTypeNames = {
            'sim_swap': 'SIM Swap',
            'identity_theft': 'Identity Theft',
            'device_cloning': 'Device Cloning',
            'mobile_money_fraud': 'Mobile Money Fraud',
            'agent_collusion': 'Agent Collusion',
            'social_engineering': 'Social Engineering',
            'repayment_fraud': 'Repayment Fraud',
            'synthetic_identity': 'Synthetic Identity',
            'suspicious_transaction': 'Suspicious Transaction',
            'wrong_pin_attempt': 'Wrong PIN Attempt',
            'blocked_transaction': 'Blocked Transaction'
        };

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = '/login';
        }

        function getRiskClass(level) {
            switch(level?.toUpperCase()) {
                case 'CRITICAL': return 'risk-critical';
                case 'HIGH': return 'risk-high';
                case 'MEDIUM': return 'risk-medium';
                case 'LOW': return 'risk-low';
                default: return '';
            }
        }

        function generateExplanation(alert) {
            const fraudType = fraudTypeNames[alert.fraud_type] || alert.fraud_type;
            const amount = alert.detection_signals?.amount || 'Unknown';
            const location = alert.detection_signals?.location || 'Unknown';
            const time = new Date(alert.timestamp).toLocaleTimeString();
            
            let explanation = `This transaction was flagged as ${fraudType}. `;
            
            if (alert.risk_score > 0.8) {
                explanation += 'The risk score is critically high. ';
            }
            
            if (amount !== 'Unknown' && parseInt(amount.replace(/[^0-9]/g, '')) > 45000) {
                explanation += 'The amount exceeds normal transaction limits. ';
            }
            
            if (alert.fraud_type === 'wrong_pin_attempt') {
                explanation = 'Multiple incorrect PIN attempts detected. This transaction was automatically blocked for security.';
            }
            
            if (alert.fraud_type === 'sim_swap') {
                explanation = 'SIM card change detected shortly before this transaction. This is a common fraud pattern.';
            }
            
            return explanation;
        }

        async function fetchAlertDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const alertId = urlParams.get('id');

            if (!alertId) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'No alert ID specified';
                return;
            }

            try {
                const response = await fetch(`/api/v2/alerts/${alertId}`);
                if (!response.ok) throw new Error('Alert not found');
                
                const alert = await response.json();
                displayAlert(alert);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Failed to load alert: ' + error.message;
            }
        }

        function displayAlert(alert) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('alertContent').style.display = 'block';

            const fraudType = fraudTypeNames[alert.fraud_type] || alert.fraud_type;
            const riskPercent = Math.round(alert.risk_score * 100);
            const signals = alert.detection_signals || {};
            
            document.getElementById('alertId').textContent = '#' + alert.alert_id;
            document.getElementById('transactionId').textContent = alert.transaction_id;
            document.getElementById('userId').textContent = alert.user_id;
            document.getElementById('fraudType').textContent = fraudType;
            document.getElementById('riskScore').textContent = riskPercent + '%';
            
            const riskBadge = document.getElementById('riskBadge');
            riskBadge.textContent = alert.risk_level;
            riskBadge.className = 'risk-badge-large ' + getRiskClass(alert.risk_level);
            
            document.getElementById('amount').textContent = signals.amount || 'N/A';
            document.getElementById('location').textContent = signals.location || 'N/A';
            document.getElementById('timestamp').textContent = new Date(alert.timestamp).toLocaleString();
            document.getElementById('status').textContent = alert.acknowledged ? 'Reviewed' : 'New';
            
            document.getElementById('explanation').textContent = generateExplanation(alert);
            document.getElementById('signals').textContent = JSON.stringify(signals, null, 2);

            if (alert.acknowledged) {
                document.getElementById('markReviewedBtn').disabled = true;
            }
        }

        async function markAsReviewed() {
            const urlParams = new URLSearchParams(window.location.search);
            const alertId = urlParams.get('id');
            
            if (!alertId) return;

            try {
                const response = await fetch(`/api/v2/alerts/${alertId}/acknowledge`, {
                    method: 'POST'
                });

                if (response.ok) {
                    alert('Alert marked as reviewed');
                    document.getElementById('markReviewedBtn').disabled = true;
                    document.getElementById('status').textContent = 'Reviewed';
                } else {
                    alert('Failed to mark as reviewed');
                }
            } catch (error) {
                alert('Network error');
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
                window.location.href = '/login';
                return;
            }
            fetchAlertDetails();
        };
    </script>
</body>
</html>
