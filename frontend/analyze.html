<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogSense - Analyze Alert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #333;
        }

        .sidebar-header h2 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            color: white;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #ccc;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 14px;
        }

        .sidebar-nav a:hover {
            background: #333;
            color: white;
        }

        .sidebar-nav a.active {
            background: #333;
            color: white;
            border-left: 3px solid white;
        }

        .sidebar-nav a i {
            width: 24px;
            font-size: 16px;
            margin-right: 12px;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #333;
        }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 0;
        }

        .sidebar-footer a:hover {
            color: white;
        }

        .sidebar-footer a i {
            width: 24px;
            margin-right: 12px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 250px;
            padding: 30px;
        }

        .page-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h1 {
            font-size: 24px;
            color: #333;
            font-weight: 500;
        }

        .back-link {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #1a1a1a;
            text-decoration: underline;
        }

        /* Alert Card */
        .alert-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 30px;
            margin-bottom: 20px;
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .fraud-type-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
        }

        .fraud-critical {
            background: #fee;
            color: #c00;
        }

        .fraud-high {
            background: #fff3e0;
            color: #f57c00;
        }

        .fraud-medium {
            background: #fff9c4;
            color: #fbc02d;
        }

        .fraud-low {
            background: #e8f5e9;
            color: #2e7d32;
        }

        /* Details Grid */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .detail-item {
            padding: 15px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .detail-label {
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #1a1a1a;
            font-size: 18px;
            font-weight: 600;
        }

        .detail-value.small {
            font-size: 14px;
            font-weight: 400;
        }

        /* Signals Section */
        .signals-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .signals-section h3 {
            color: #333;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .signal-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #1a1a1a;
        }

        .signal-name {
            color: #1a1a1a;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .signal-desc {
            color: #666;
            font-size: 13px;
        }

        .signal-value {
            color: #1a1a1a;
            font-size: 13px;
            font-weight: 500;
            margin-top: 5px;
        }

        /* Explanation Box */
        .explanation-box {
            background: #fff3e0;
            border-left: 4px solid #f57c00;
            padding: 20px;
            border-radius: 6px;
            margin-top: 20px;
        }

        .explanation-box h4 {
            color: #f57c00;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .explanation-box p {
            color: #333;
            font-size: 14px;
            line-height: 1.6;
        }

        .explanation-list {
            margin-top: 10px;
            padding-left: 20px;
        }

        .explanation-list li {
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-primary {
            background: #1a1a1a;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-primary:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: #1a1a1a;
            padding: 12px 24px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #c00;
            background: #fee;
            border-radius: 8px;
        }

        /* Fraud type mapping */
        .fraud-icon {
            font-size: 24px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>LOGSENSE</h2>
            <p>Fraud Detection</p>
        </div>

        <div class="sidebar-nav">
            <a href="/dashboard">
                <i>DS</i> Dashboard
            </a>
            <a href="/alerts">
                <i>AL</i> Alerts
            </a>
            <a href="/analyze" class="active">
                <i>AN</i> Analyze
            </a>
            <a href="/settings">
                <i>ST</i> Settings
            </a>
        </div>

        <div class="sidebar-footer">
            <a href="#" onclick="logout()">
                <i>LO</i> Logout
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>Analyze Alert</h1>
            <a href="/alerts" class="back-link">ŌåÉ Back to Alerts</a>
        </div>

        <div id="loading" class="loading">Loading alert details...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="alertContent" style="display: none;">
            <div class="alert-card">
                <div class="alert-header">
                    <div>
                        <span class="fraud-icon" id="fraudIcon">Ē║©</span>
                        <span class="fraud-type-badge" id="fraudTypeBadge"></span>
                    </div>
                    <div class="alert-id">Alert #<span id="alertId"></span></div>
                </div>

                <div class="details-grid">
                    <div class="detail-item">
                        <div class="detail-label">Transaction ID</div>
                        <div class="detail-value" id="transactionId"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">User ID</div>
                        <div class="detail-value" id="userId"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Amount</div>
                        <div class="detail-value" id="amount">KES 0</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Risk Score</div>
                        <div class="detail-value" id="riskScore">0%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Location</div>
                        <div class="detail-value small" id="location"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Timestamp</div>
                        <div class="detail-value small" id="timestamp"></div>
                    </div>
                </div>

                <div class="explanation-box" id="explanationBox">
                    <h4 id="explanationTitle">Why this was flagged</h4>
                    <ul class="explanation-list" id="explanationList">
                        <li>Loading detection signals...</li>
                    </ul>
                </div>

                <div class="signals-section">
                    <h3>Detection Signals</h3>
                    <div id="signalsList"></div>
                </div>

                <div class="action-buttons">
                    <button id="markReviewedBtn" class="btn-primary" onclick="markAsReviewed()">Mark as Reviewed</button>
                    <button class="btn-secondary" onclick="window.location.href='/alerts'">Back to Alerts</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fraud type mapping
        const fraudTypes = {
            'SIM_SWAP': {
                name: 'SIM Swap',
                icon: 'Ē│▒',
                color: '#c00',
                bgColor: '#fee',
                risk: 'CRITICAL'
            },
            'IDENTITY_THEFT': {
                name: 'Identity Theft',
                icon: 'ĒČö',
                color: '#c00',
                bgColor: '#fee',
                risk: 'CRITICAL'
            },
            'DEVICE_CLONING': {
                name: 'Device Cloning',
                icon: 'Ē│Ź',
                color: '#c00',
                bgColor: '#fee',
                risk: 'CRITICAL'
            },
            'MOBILE_MONEY_FRAUD': {
                name: 'Mobile Money Fraud',
                icon: 'Ē▓░',
                color: '#f57c00',
                bgColor: '#fff3e0',
                risk: 'HIGH'
            },
            'AGENT_COLLUSION': {
                name: 'Agent Collusion',
                icon: 'Ē▒ź',
                color: '#f57c00',
                bgColor: '#fff3e0',
                risk: 'HIGH'
            },
            'SOCIAL_ENGINEERING': {
                name: 'Social Engineering',
                icon: 'ĒŠŻ',
                color: '#fbc02d',
                bgColor: '#fff9c4',
                risk: 'MEDIUM'
            },
            'REPAYMENT_FRAUD': {
                name: 'Repayment Fraud',
                icon: 'Ē┤ä',
                color: '#fbc02d',
                bgColor: '#fff9c4',
                risk: 'MEDIUM'
            },
            'SYNTHETIC_IDENTITY': {
                name: 'Synthetic Identity',
                icon: 'ĒŠŁ',
                color: '#c00',
                bgColor: '#fee',
                risk: 'CRITICAL'
            },
            'WRONG_PIN_ATTEMPT': {
                name: 'Wrong PIN Attempt',
                icon: 'Ē┤Æ',
                color: '#f57c00',
                bgColor: '#fff3e0',
                risk: 'HIGH'
            },
            'BLOCKED_TRANSACTION': {
                name: 'Blocked Transaction',
                icon: 'Ē║½',
                color: '#c00',
                bgColor: '#fee',
                risk: 'CRITICAL'
            },
            'SUSPICIOUS_TRANSACTION': {
                name: 'Suspicious Transaction',
                icon: 'ŌÜĀ’ĖÅ',
                color: '#f57c00',
                bgColor: '#fff3e0',
                risk: 'HIGH'
            }
        };

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = '/login';
        }

        function formatAmount(amount) {
            if (!amount) return 'KES 0';
            // If amount is a number or string, format it properly
            const numAmount = typeof amount === 'number' ? amount : parseFloat(amount) || 0;
            return 'KES ' + numAmount.toLocaleString();
        }

        function getExplanationFromSignals(signals, fraudType) {
            const explanations = [];
            
            if (!signals) return ['No detection signals available'];

            // Parse signals if they're a string
            let parsedSignals = signals;
            if (typeof signals === 'string') {
                try {
                    parsedSignals = JSON.parse(signals);
                } catch {
                    return [signals];
                }
            }

            // Generate explanations based on fraud type and signals
            switch(fraudType) {
                case 'SIM_SWAP':
                    if (parsedSignals.new_device) explanations.push('New SIM card registered on different device');
                    if (parsedSignals.new_location) explanations.push('Transaction from new location');
                    if (parsedSignals.impossible_travel) explanations.push('Impossible travel time between locations');
                    if (parsedSignals.failed_pins) explanations.push(`${parsedSignals.failed_pins} failed PIN attempts recently`);
                    break;
                    
                case 'IDENTITY_THEFT':
                    if (parsedSignals.amount_ratio) explanations.push(`Amount is ${Math.round(parsedSignals.amount_ratio)}x higher than normal`);
                    if (parsedSignals.new_recipient) explanations.push('Sending to new recipient');
                    if (parsedSignals.unusual_time) explanations.push(`Transaction at unusual hour (${parsedSignals.unusual_time}:00)`);
                    if (parsedSignals.multiple_recipients) explanations.push(`Multiple recipients in short time`);
                    break;
                    
                case 'DEVICE_CLONING':
                    if (parsedSignals.device_active_elsewhere) explanations.push('Device active in multiple locations simultaneously');
                    if (parsedSignals.device_rooted) explanations.push('Device appears to be rooted/jailbroken');
                    if (parsedSignals.app_tampered) explanations.push('App tampering detected');
                    break;
                    
                case 'MOBILE_MONEY_FRAUD':
                    if (parsedSignals.high_velocity) explanations.push(`${parsedSignals.high_velocity} transactions in last 5 minutes`);
                    if (parsedSignals.many_recipients) explanations.push(`Sent to ${parsedSignals.many_recipients} different people`);
                    if (parsedSignals.round_amount) explanations.push(`Round amount (KES ${parsedSignals.round_amount}) - common in fraud`);
                    break;
                    
                case 'SOCIAL_ENGINEERING':
                    if (parsedSignals.new_beneficiary) explanations.push('Sending to new beneficiary');
                    if (parsedSignals.amount_ratio) explanations.push(`Amount ${Math.round(parsedSignals.amount_ratio)}x higher than normal`);
                    if (parsedSignals.urgent_keyword) explanations.push(`Urgent keyword detected: "${parsedSignals.urgent_keyword}"`);
                    break;
                    
                default:
                    // Generic explanations
                    if (parsedSignals.amount) explanations.push(`Amount: ${parsedSignals.amount}`);
                    if (parsedSignals.location) explanations.push(`Location: ${parsedSignals.location}`);
                    if (parsedSignals.reason) explanations.push(parsedSignals.reason);
            }

            return explanations.length > 0 ? explanations : ['Unusual transaction pattern detected'];
        }

        async function fetchAlertDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const alertId = urlParams.get('id');

            if (!alertId) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'No alert ID specified';
                return;
            }

            try {
                const response = await fetch(`/api/v2/alerts/${alertId}`);
                if (!response.ok) throw new Error('Alert not found');
                
                const alert = await response.json();
                displayAlert(alert);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Failed to load alert: ' + error.message;
            }
        }

        function displayAlert(alert) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('alertContent').style.display = 'block';

            // Get fraud type info
            const fraudInfo = fraudTypes[alert.fraud_type] || fraudTypes['SUSPICIOUS_TRANSACTION'];
            
            // Set fraud type badge
            const badge = document.getElementById('fraudTypeBadge');
            badge.textContent = fraudInfo.name;
            badge.style.backgroundColor = fraudInfo.bgColor;
            badge.style.color = fraudInfo.color;
            
            document.getElementById('fraudIcon').textContent = fraudInfo.icon;
            document.getElementById('alertId').textContent = alert.alert_id;
            document.getElementById('transactionId').textContent = alert.transaction_id;
            document.getElementById('userId').textContent = alert.user_id;
            
            // Format amount properly - fix for "amount.replace is not a function"
            const amount = alert.detection_signals?.amount || alert.amount || 0;
            document.getElementById('amount').textContent = formatAmount(amount);
            
            const riskPercent = Math.round((alert.risk_score || 0) * 100);
            document.getElementById('riskScore').textContent = riskPercent + '%';
            
            document.getElementById('location').textContent = alert.detection_signals?.location || 'Unknown';
            document.getElementById('timestamp').textContent = new Date(alert.timestamp).toLocaleString();

            // Generate explanations
            const explanations = getExplanationFromSignals(alert.detection_signals, alert.fraud_type);
            const explanationList = document.getElementById('explanationList');
            explanationList.innerHTML = explanations.map(exp => `<li>${exp}</li>`).join('');

            // Display all signals
            const signalsList = document.getElementById('signalsList');
            if (alert.detection_signals) {
                let signals = alert.detection_signals;
                if (typeof signals === 'string') {
                    try {
                        signals = JSON.parse(signals);
                    } catch {
                        signalsList.innerHTML = `<div class="signal-item">${signals}</div>`;
                    }
                }
                
                if (typeof signals === 'object') {
                    signalsList.innerHTML = Object.entries(signals).map(([key, value]) => `
                        <div class="signal-item">
                            <div class="signal-name">${key.replace(/_/g, ' ')}</div>
                            <div class="signal-desc">${typeof value === 'object' ? JSON.stringify(value) : value}</div>
                        </div>
                    `).join('');
                }
            } else {
                signalsList.innerHTML = '<div class="signal-item">No detailed signals available</div>';
            }

            if (alert.acknowledged) {
                document.getElementById('markReviewedBtn').disabled = true;
            }
        }

        async function markAsReviewed() {
            const urlParams = new URLSearchParams(window.location.search);
            const alertId = urlParams.get('id');
            
            if (!alertId) return;

            try {
                const response = await fetch(`/api/v2/alerts/${alertId}/acknowledge`, {
                    method: 'POST'
                });

                if (response.ok) {
                    alert('Alert marked as reviewed');
                    document.getElementById('markReviewedBtn').disabled = true;
                } else {
                    alert('Failed to mark as reviewed');
                }
            } catch (error) {
                alert('Network error');
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
                window.location.href = '/login';
                return;
            }
            fetchAlertDetails();
        };
    </script>
</body>
</html>
