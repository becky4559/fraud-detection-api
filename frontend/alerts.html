<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogSense - Incident Logs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; color: #c5c6c7; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #1f2833; border-right: 1px solid #45a29e; height: 100vh; position: fixed; padding: 25px; }
        .sidebar h2 { color: #66fcf1; letter-spacing: 2px; margin-bottom: 40px; }
        .sidebar a { display: block; color: #8892b0; padding: 12px; text-decoration: none; font-size: 14px; margin-bottom: 10px; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { color: #66fcf1; background: rgba(102, 252, 241, 0.05); border-left: 3px solid #66fcf1; }

        .main { flex: 1; margin-left: 260px; padding: 40px; }
        .card { background: #1f2833; border: 1px solid #45a29e; padding: 30px; border-radius: 4px; }
        
        h1 { color: #fff; margin-bottom: 30px; font-size: 24px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #66fcf1; font-size: 12px; text-transform: uppercase; padding: 15px; border-bottom: 1px solid #45a29e; }
        td { padding: 15px; border-bottom: 1px solid #0b0c10; font-size: 14px; }

        .badge { padding: 4px 10px; border-radius: 2px; font-size: 11px; font-weight: bold; }
        .CRITICAL { background: rgba(255, 76, 76, 0.1); color: #ff4c4c; border: 1px solid #ff4c4c; }
        .reviewed { opacity: 0.5; filter: grayscale(1); }

        .actions { display: flex; gap: 10px; }
        .btn { padding: 6px 12px; font-size: 11px; cursor: pointer; text-decoration: none; font-weight: bold; transition: 0.3s; background: transparent; }
        .btn-analyze { border: 1px solid #66fcf1; color: #66fcf1; }
        .btn-analyze:hover { background: #66fcf1; color: #0b0c10; }
        .btn-review { border: 1px solid #45a29e; color: #45a29e; }
        .btn-review:hover { background: #45a29e; color: #0b0c10; }
        .btn-done { border: 1px solid #2ecc71; color: #2ecc71; pointer-events: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LOGSENSE</h2>
        <a href="/dashboard">Surveillance Console</a>
        <a href="/alerts" class="active">Incident Logs</a>
        <a href="/" onclick="sessionStorage.clear()">Terminal Logout</a>
    </div>

    <div class="main">
        <h1>Incident Audit Trail</h1>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Reference</th>
                        <th>User</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="alertsTable">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchAlerts() {
            try {
                const response = await fetch('/api/v2/alerts/recent');
                const alerts = await response.json();
                const table = document.getElementById('alertsTable');
                
                table.innerHTML = alerts.map(a => `
                    <tr class="${a.acknowledged ? 'reviewed' : ''}">
                        <td style="font-family: monospace; color: #66fcf1;">${a.transaction_id}</td>
                        <td>${a.user_name}</td>
                        <td>${a.fraud_name}</td>
                        <td>KES ${a.amount.toLocaleString()}</td>
                        <td><span class="badge ${a.risk_level}">${a.risk_level}</span></td>
                        <td class="actions">
                            <a href="/analyze?id=${a.id}" class="btn btn-analyze">ANALYZE</a>
                            ${a.acknowledged 
                                ? '<span class="btn btn-done">REVIEWED</span>' 
                                : `<button onclick="markAsReviewed(${a.id})" class="btn btn-review">MARK REVIEWED</button>`
                            }
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Fetch failed");
            }
        }

        async function markAsReviewed(id) {
            if(!confirm("Close this investigation and mark as reviewed?")) return;
            
            try {
                const response = await fetch(`/api/v2/alerts/${id}/review`, { method: 'PATCH' });
                if (response.ok) {
                    fetchAlerts(); // Refresh the list
                }
            } catch (err) {
                alert("Update failed. Check server connection.");
            }
        }

        window.onload = fetchAlerts;
    </script>
</body>
</html>
