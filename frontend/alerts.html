<script>
        let allAlerts = [];

        // 1. Updated Mapping to include our new Kenya-specific types
        const fraudTypeNames = {
            'SIM_SWAP': 'SIM Swap',
            'IDENTITY_THEFT': 'Identity Theft',
            'DEVICE_CLONING': 'Device Cloning',
            'MOBILE_MONEY_FRAUD': 'Mobile Money Fraud',
            'AGENT_COLLUSION': 'Agent Collusion',
            'SOCIAL_ENGINEERING': 'Social Engineering',
            'REPAYMENT_FRAUD': 'Repayment Fraud',
            'SYNTHETIC_IDENTITY': 'Synthetic Identity',
            'WRONG_PIN_ATTEMPT': 'Wrong PIN Attempt',
            'BLOCKED_TRANSACTION': 'Blocked Transaction',
            'RECURRING_FRAUD_PATTERN': 'Repeated Fraud Pattern' // <-- Added this
        };

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = '/login';
        }

        async function fetchAlerts() {
            try {
                const response = await fetch('/api/v2/alerts/recent?limit=50');
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    allAlerts = data;
                    updateStats(allAlerts);
                    renderAlerts(allAlerts);
                } else {
                    document.getElementById('alertsBody').innerHTML = 
                        '<tr><td colspan="8" class="loading">No alerts found</td></tr>';
                }
            } catch (error) {
                document.getElementById('alertsBody').innerHTML = 
                    '<tr><td colspan="8" class="loading">Failed to load alerts</td></tr>';
            }
        }

        function updateStats(alerts) {
            const total = alerts.length;
            const critical = alerts.filter(a => a.risk_level === 'CRITICAL').length;
            const high = alerts.filter(a => a.risk_level === 'HIGH').length;
            const unreviewed = alerts.filter(a => !a.acknowledged).length;
            
            document.getElementById('totalAlerts').textContent = total;
            document.getElementById('criticalCount').textContent = critical;
            document.getElementById('highCount').textContent = high;
            document.getElementById('unreviewedCount').textContent = unreviewed;
        }

        function renderAlerts(alerts) {
            const tbody = document.getElementById('alertsBody');
            
            if (alerts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="loading">No alerts found</td></tr>';
                return;
            }

            let html = '';
            alerts.forEach(alert => {
                const riskClass = `risk-${alert.risk_level?.toLowerCase() || 'medium'}`;
                const dateObj = new Date(alert.timestamp);
                const timestamp = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                const status = alert.acknowledged ? 
                    '<span class="status-reviewed">Reviewed</span>' : 
                    '<span class="status-new">New</span>';
                
                const riskPercent = Math.round((alert.risk_score || 0) * 100);
                
                // Get proper fraud type name
                let fraudTypeDisplay = fraudTypeNames[alert.fraud_type] || alert.fraud_type;

                // 2. Add a 'History' badge if it's a recurring pattern
                let historyBadge = "";
                if (alert.fraud_type === 'RECURRING_FRAUD_PATTERN') {
                    historyBadge = '<br><small style="color: #c00; font-weight: bold;">⚠️ HISTORY MATCH</small>';
                }
                
                html += `
                    <tr onclick="viewAlert(${alert.alert_id})">
                        <td>#${alert.alert_id}</td>
                        <td><strong>${alert.user_name || alert.user_id}</strong></td>
                        <td>${fraudTypeDisplay}${historyBadge}</td>
                        <td><strong>KES ${(alert.amount || 0).toLocaleString()}</strong></td>
                        <td>${riskPercent}%</td>
                        <td><span class="risk-badge ${riskClass}">${alert.risk_level || 'MEDIUM'}</span></td>
                        <td>${timestamp}</td>
                        <td>${status}</td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }

        function viewAlert(alertId) {
            window.location.href = `/analyze?id=${alertId}`;
        }

        window.onload = function() {
            // Check login (Uncomment for production)
            // if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            //    window.location.href = '/login';
            //    return;
            // }
            fetchAlerts();
            // Refresh every 10 seconds for a "live" feel during demo
            setInterval(fetchAlerts, 10000); 
        };
    </script>
