<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogSense - All Alerts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f5f5f5; display: flex; }
        .sidebar { width: 250px; background: #1a1a1a; color: white; height: 100vh; position: fixed; padding: 20px; }
        .sidebar a { display: block; color: #ccc; padding: 10px; text-decoration: none; margin-bottom: 5px; }
        .sidebar a.active { background: #333; color: white; border-left: 4px solid white; }
        .main { flex: 1; margin-left: 250px; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .risk-CRITICAL { color: #c00; font-weight: bold; }
        .btn { padding: 6px 12px; background: #1a1a1a; color: white; text-decoration: none; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LOGSENSE</h2><br>
        <a href="/dashboard">Dashboard</a>
        <a href="/alerts" class="active">Alerts</a>
    </div>
    <div class="main">
        <div class="card">
            <h1>Fraud Alerts History</h1>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>User</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Risk</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="alertsList">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadAlerts() {
            try {
                const response = await fetch('/api/v2/alerts/recent');
                const alerts = await response.json();
                const list = document.getElementById('alertsList');
                
                list.innerHTML = alerts.map(a => `
                    <tr>
                        <td>${new Date(a.timestamp).toLocaleTimeString()}</td>
                        <td>${a.user_name}</td>
                        <td>${a.fraud_name}</td>
                        <td>KES ${a.amount.toLocaleString()}</td>
                        <td class="risk-${a.risk_level}">${a.risk_level}</td>
                        <td><a href="/analyze?id=${a.id}" class="btn">Analyze</a></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Error loading alerts:", err);
            }
        }
        window.onload = loadAlerts;
    </script>
</body>
</html>
