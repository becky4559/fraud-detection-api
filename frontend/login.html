<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogSense - Admin Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #0b0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #c5c6c7;
        }

        .login-box {
            background: #1f2833;
            border: 1px solid #45a29e;
            border-radius: 4px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo h1 {
            color: #66fcf1;
            font-size: 32px;
            letter-spacing: 3px;
            font-weight: 800;
        }

        .logo p {
            color: #8892b0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #66fcf1;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: #0b0c10;
            border: 1px solid #45a29e;
            border-radius: 4px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #66fcf1;
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #45a29e;
            color: #0b0c10;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            background: #66fcf1;
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            background: #1f2833;
            color: #45a29e;
            border: 1px solid #45a29e;
            cursor: not-allowed;
        }

        .error-message {
            color: #ff4c4c;
            font-size: 13px;
            margin-top: 15px;
            text-align: center;
            display: none;
            background: rgba(255, 76, 76, 0.1);
            padding: 10px;
            border-radius: 4px;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(11, 12, 16, 0.3);
            border-top: 3px solid #0b0c10;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>LOGSENSE</h1>
            <p>Admin Secure Access</p>
        </div>

        <div class="form-group">
            <label>System Credentials</label>
            <input type="text" id="username" placeholder="Username" value="admin">
        </div>

        <div class="form-group">
            <input type="password" id="password" placeholder="Password" value="admin123">
        </div>

        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
            <span id="loginText">Initialize Session</span>
        </button>

        <div class="error-message" id="errorMessage"></div>
    </div>

    <script>
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'admin123';

        async function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const text = document.getElementById('loginText');
            const err = document.getElementById('errorMessage');

            if (!user || !pass) {
                showError('Credentials Required');
                return;
            }

            btn.disabled = true;
            text.innerHTML = '<span class="loading"></span> Verifying...';
            err.style.display = 'none';

            setTimeout(() => {
                if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    window.location.href = '/dashboard';
                } else {
                    showError('Access Denied: Invalid Credentials');
                    btn.disabled = false;
                    text.innerHTML = 'Initialize Session';
                }
            }, 1200);
        }

        function showError(message) {
            const err = document.getElementById('errorMessage');
            err.textContent = message;
            err.style.display = 'block';
        }

        window.onload = function() {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                window.location.href = '/dashboard';
            }
        };

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
