<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogSense - Surveillance Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; display: flex; color: #c5c6c7; overflow-x: hidden; }
        
        /* Sidebar */
        .sidebar { 
            width: 250px; 
            background: #1f2833; 
            height: 100vh; 
            position: fixed; 
            padding: 20px; 
            border-right: 1px solid #45a29e;
        }
        .sidebar h2 { color: #66fcf1; letter-spacing: 2px; margin-bottom: 30px; font-size: 22px; }
        .sidebar a { 
            display: block; 
            color: #8892b0; 
            padding: 12px; 
            text-decoration: none; 
            margin-bottom: 10px; 
            font-size: 14px;
            transition: 0.3s;
            border-left: 3px solid transparent;
        }
        .sidebar a:hover, .sidebar a.active { 
            background: rgba(102, 252, 241, 0.05); 
            color: #66fcf1; 
            border-left: 3px solid #66fcf1; 
        }

        /* Main Content */
        .main { flex: 1; margin-left: 250px; padding: 40px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .status-pill { background: rgba(102, 252, 241, 0.1); color: #66fcf1; padding: 5px 15px; border-radius: 20px; font-size: 12px; border: 1px solid #66fcf1; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #1f2833; padding: 25px; border-radius: 4px; border: 1px solid #45a29e; }
        .stat-card small { color: #8892b0; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .stat-card h2 { color: #fff; font-size: 28px; margin-top: 5px; }

        /* Alert Table */
        .card { background: #1f2833; padding: 30px; border-radius: 4px; border: 1px solid #45a29e; }
        .card h3 { color: #66fcf1; margin-bottom: 20px; font-size: 16px; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #45a29e; font-size: 12px; border-bottom: 1px solid #45a29e; }
        td { padding: 15px; border-bottom: 1px solid #0b0c10; font-size: 14px; }

        .risk-CRITICAL { color: #ff4c4c; font-weight: bold; }
        .btn { 
            padding: 6px 12px; 
            border: 1px solid #66fcf1; 
            color: #66fcf1; 
            text-decoration: none; 
            font-size: 11px; 
            transition: 0.3s;
        }
        .btn:hover { background: #66fcf1; color: #0b0c10; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LOGSENSE</h2>
        <a href="/dashboard" class="active">Surveillance Console</a>
        <a href="/alerts">Incident Logs</a>
        <a href="/" onclick="sessionStorage.clear()">Terminal Logout</a>
    </div>

    <div class="main">
        <div class="header">
            <h1>System Overview</h1>
            <div class="status-pill">AI ENGINE: ACTIVE</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <small>Active Threats</small>
                <h2 id="threatCount">--</h2>
            </div>
            <div class="stat-card">
                <small>Risk Index</small>
                <h2 style="color: #ff4c4c;">CRITICAL</h2>
            </div>
            <div class="stat-card">
                <small>Nodes Monitored</small>
                <h2>1,204</h2>
            </div>
        </div>

        <div class="card">
            <h3>Recent Intercepts</h3>
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>Type</th>
                        <th>Risk</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="interceptsList">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchDashboard() {
            if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
                window.location.href = '/';
                return;
            }

            try {
                const response = await fetch('/api/v2/alerts/recent');
                const alerts = await response.json();
                
                document.getElementById('threatCount').innerText = alerts.length;
                
                const list = document.getElementById('interceptsList');
                list.innerHTML = alerts.slice(0, 5).map(a => `
                    <tr>
                        <td style="font-family: monospace;">${new Date(a.timestamp).toLocaleTimeString()}</td>
                        <td>${a.user_name}</td>
                        <td>${a.fraud_name}</td>
                        <td class="risk-${a.risk_level}">${a.risk_level}</td>
                        <td><a href="/analyze?id=${a.id}" class="btn">INVESTIGATE</a></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Connection Failed", err);
            }
        }

        setInterval(fetchDashboard, 5000);
        window.onload = fetchDashboard;
    </script>
</body>
</html>
