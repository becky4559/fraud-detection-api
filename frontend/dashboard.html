<script>
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = '/login';
        }

        // Logic to refresh and calculate the Kenyan Dashboard stats
        async function refreshDashboard() {
            try {
                const response = await fetch('/api/v2/alerts/recent?limit=200');
                const alerts = await response.json();
                
                if (Array.isArray(alerts) && alerts.length > 0) {
                    const total = alerts.length;

                    // 1. Calculate Risk Levels
                    const critical = alerts.filter(a => a.risk_level === 'CRITICAL').length;
                    const high = alerts.filter(a => a.risk_level === 'HIGH').length;
                    const medium = alerts.filter(a => a.risk_level === 'MEDIUM').length;
                    const low = alerts.filter(a => a.risk_level === 'LOW').length;

                    // Update Risk UI
                    document.getElementById('criticalCount').textContent = critical;
                    document.getElementById('highCount').textContent = high;
                    document.getElementById('mediumCount').textContent = medium;
                    document.getElementById('lowCount').textContent = low;

                    // Update Visual Bars (Safety check for divide by zero)
                    const getWidth = (count) => total > 0 ? (count / total * 100) + '%' : '0%';
                    document.getElementById('criticalBar').style.width = getWidth(critical);
                    document.getElementById('highBar').style.width = getWidth(high);
                    document.getElementById('mediumBar').style.width = getWidth(medium);
                    document.getElementById('lowBar').style.width = getWidth(low);

                    // 2. Count All 8 Fraud Types + Recurring Pattern
                    const fraudCounts = {
                        'SIM_SWAP': 0,
                        'IDENTITY_THEFT': 0,
                        'DEVICE_CLONING': 0,
                        'MOBILE_MONEY_FRAUD': 0,
                        'AGENT_COLLUSION': 0,
                        'SOCIAL_ENGINEERING': 0,
                        'REPAYMENT_FRAUD': 0,
                        'SYNTHETIC_IDENTITY': 0,
                        'RECURRING_FRAUD_PATTERN': 0 // Combined with Social Engineering for summary
                    };

                    alerts.forEach(a => {
                        if (fraudCounts.hasOwnProperty(a.fraud_type)) {
                            fraudCounts[a.fraud_type]++;
                        }
                    });

                    // Update Fraud Summary UI
                    document.getElementById('simSwapCount').textContent = fraudCounts.SIM_SWAP;
                    document.getElementById('identityTheftCount').textContent = fraudCounts.IDENTITY_THEFT;
                    document.getElementById('deviceCloningCount').textContent = fraudCounts.DEVICE_CLONING;
                    document.getElementById('mobileFraudCount').textContent = fraudCounts.MOBILE_MONEY_FRAUD;
                    document.getElementById('agentCollusionCount').textContent = fraudCounts.AGENT_COLLUSION;
                    // For the demo, we'll combine Social Engineering and Recurring Pattern for a cleaner list
                    document.getElementById('socialEngineeringCount').textContent = 
                        fraudCounts.SOCIAL_ENGINEERING + fraudCounts.RECURRING_FRAUD_PATTERN;
                    document.getElementById('repaymentFraudCount').textContent = fraudCounts.REPAYMENT_FRAUD;
                    document.getElementById('syntheticIdentityCount').textContent = fraudCounts.SYNTHETIC_IDENTITY;

                    // 3. Update Stats Cards (Simulated dynamic stats based on alerts)
                    document.getElementById('totalTxns').textContent = (1247 + total).toLocaleString();
                    document.getElementById('blockedTxns').textContent = (critical + high);
                    document.getElementById('pendingTxns').textContent = alerts.filter(a => !a.acknowledged).length;

                    // 4. Update Recent Transactions Table
                    const recentTable = document.getElementById('recentTransactionsList');
                    let tableHtml = '';
                    // Take the top 5 most recent
                    alerts.slice(0, 5).forEach(a => {
                        tableHtml += `
                            <tr>
                                <td>${a.user_name || 'User'}</td>
                                <td><strong>KES ${a.amount.toLocaleString()}</strong></td>
                                <td><span class="risk-badge risk-${a.risk_level.toLowerCase()}">${a.risk_level}</span></td>
                            </tr>
                        `;
                    });
                    recentTable.innerHTML = tableHtml;
                }
            } catch (error) {
                console.error('Dashboard sync error:', error);
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
                window.location.href = '/login';
                return;
            }
            
            // Run once on load
            refreshDashboard();
            // Refresh every 10 seconds to show "Live" M-Pesa/Bank feeds
            setInterval(refreshDashboard, 10000);
        };
    </script>
