<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogSense - Control Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #1f2833;
            border-right: 1px solid #45a29e;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-header {
            padding: 30px 25px;
            border-bottom: 1px solid #0b0c10;
        }

        .sidebar-header h2 { color: #66fcf1; letter-spacing: 2px; font-size: 22px; }

        .sidebar-nav { flex: 1; padding: 20px 0; }
        
        .sidebar-nav a {
            display: block;
            padding: 15px 25px;
            color: #8892b0;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            color: #66fcf1;
            background: rgba(102, 252, 241, 0.05);
            border-left: 3px solid #66fcf1;
        }

        /* Main Content */
        .main-content { flex: 1; margin-left: 260px; padding: 40px; }

        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1f2833;
            border: 1px solid #45a29e;
            padding: 25px;
            border-radius: 4px;
        }

        .stat-label { color: #8892b0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { color: #fff; font-size: 32px; font-weight: 800; margin-top: 10px; }
        .stat-value.danger { color: #ff4c4c; }

        /* Tables */
        .card {
            background: #1f2833;
            border: 1px solid #45a29e;
            padding: 25px;
            border-radius: 4px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #66fcf1; font-size: 12px; text-transform: uppercase; padding: 12px; border-bottom: 1px solid #45a29e; }
        td { padding: 15px 12px; border-bottom: 1px solid #0b0c10; font-size: 14px; color: #c5c6c7; }

        .badge { padding: 4px 10px; border-radius: 2px; font-size: 11px; font-weight: bold; }
        .CRITICAL { background: rgba(255, 76, 76, 0.1); color: #ff4c4c; border: 1px solid #ff4c4c; }
        
        .btn-analyze {
            color: #66fcf1;
            text-decoration: none;
            border: 1px solid #66fcf1;
            padding: 5px 10px;
            font-size: 11px;
            transition: 0.3s;
        }

        .btn-analyze:hover { background: #66fcf1; color: #0b0c10; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>LOGSENSE</h2>
            <p style="color: #45a29e; font-size: 10px; margin-top: 5px;">AI FRAUD MONITORING</p>
        </div>
        <div class="sidebar-nav">
            <a href="/dashboard" class="active">Surveillance Console</a>
            <a href="/alerts">Incident Logs</a>
            <a href="/" onclick="sessionStorage.clear()">Terminal Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header-area">
            <div>
                <h1 style="font-size: 28px; color: #fff;">Surveillance Overview</h1>
                <p id="statusPulse" style="color: #66fcf1; font-size: 12px; margin-top: 5px;">● SYSTEM ACTIVE: SCANNING MPESA/EQUITY NODES</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <p class="stat-label">Total Scans</p>
                <div class="stat-value" id="totalAlerts">0</div>
            </div>
            <div class="stat-card">
                <p class="stat-label">Critical Threat</p>
                <div class="stat-value danger" id="critAlerts">0</div>
            </div>
            <div class="stat-card">
                <p class="stat-label">Avg Risk Score</p>
                <div class="stat-value" style="color: #66fcf1;">0.84</div>
            </div>
            <div class="stat-card">
                <p class="stat-label">System Health</p>
                <div class="stat-value">99%</div>
            </div>
        </div>

        <div class="card">
            <h3>Live Incident Stream</h3>
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Initiator</th>
                        <th>Target</th>
                        <th>Risk Level</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="liveStream">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function refreshConsole() {
            try {
                const res = await fetch('/api/v2/alerts/recent');
                const data = await res.json();
                
                document.getElementById('totalAlerts').innerText = data.length;
                document.getElementById('critAlerts').innerText = data.filter(a => a.risk_level === 'CRITICAL').length;

                const stream = document.getElementById('liveStream');
                stream.innerHTML = data.slice(0, 8).map(a => `
                    <tr>
                        <td style="font-family: monospace;">${new Date(a.timestamp).toLocaleTimeString()}</td>
                        <td>${a.user_name}</td>
                        <td>${a.recipient}</td>
                        <td><span class="badge ${a.risk_level}">${a.risk_level}</span></td>
                        <td><a href="/analyze?id=${a.id}" class="btn-analyze">INVESTIGATE</a></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error("Link Lost");
            }
        }

        setInterval(refreshConsole, 3000);
        window.onload = refreshConsole;
    </script>
</body>
</html>
