<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogSense - Forensic Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; color: #c5c6c7; padding: 40px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: #1f2833; border: 1px solid #45a29e; padding: 30px; border-radius: 4px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        h2 { color: #66fcf1; margin-bottom: 20px; text-transform: uppercase; }
        .signal-box { background: #0b0c10; padding: 15px; border-left: 3px solid #66fcf1; margin-bottom: 10px; font-family: monospace; }
        .label { color: #8892b0; font-size: 12px; }
        .value { color: #fff; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/alerts" style="color:#45a29e; text-decoration:none;"><< Return to Logs</a>
        <h1 style="color:#fff; margin: 20px 0;">Forensic Investigation: <span id="incidentId">...</span></h1>
        
        <div class="grid">
            <div class="card">
                <h2>Technical Metadata</h2>
                <div id="metadataLogs">Loading system logs...</div>
            </div>
            <div class="card">
                <h2>AI Detection Evidence</h2>
                <div id="aiReasoning">Analyzing signals...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchDetails() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            document.getElementById('incidentId').innerText = `ID-${id}`;

            try {
                const res = await fetch(`/api/v2/alerts/${id}`);
                const data = await res.json();
                
                if (data.error) {
                    document.body.innerHTML = "<h1>Alert Not Found</h1>";
                    return;
                }

                let forensics = typeof data.detection_signals === 'string' ? JSON.parse(data.detection_signals) : data.detection_signals;

                // Populate Technical Metadata
                const metaContainer = document.getElementById('metadataLogs');
                metaContainer.innerHTML = `
                    <div class="signal-box"><span class="label">IMEI STATUS</span><span class="value">${forensics.signals.IMEI_Status || 'UNKNOWN'}</span></div>
                    <div class="signal-box"><span class="label">SIM STATUS</span><span class="value">${forensics.signals.SIM_Status || 'UNKNOWN'}</span></div>
                    <div class="signal-box"><span class="label">NETWORK NODE</span><span class="value">${forensics.signals.Node_Location || 'KE-NBO-01'}</span></div>
                    <div class="signal-box"><span class="label">TRACE ID</span><span class="value">${forensics.signals.Trace_ID || 'N/A'}</span></div>
                `;

                // Populate AI Reasoning
                const reasonContainer = document.getElementById('aiReasoning');
                reasonContainer.innerHTML = forensics.explanations.map(e => `
                    <p style="color:#66fcf1; margin-bottom:15px; border-bottom:1px solid #0b0c10; padding-bottom:10px;">
                        <span style="color:#8892b0;">DETECTED:</span><br>${e}
                    </p>
                `).join('');

            } catch (err) {
                console.error(err);
            }
        }
        window.onload = fetchDetails;
    </script>
</body>
</html>
