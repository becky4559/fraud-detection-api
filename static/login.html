<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogSense - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #dc2626;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .demo-users {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .demo-users h3 {
            color: #555;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .user-badge {
            display: inline-block;
            background: #f3f4f6;
            padding: 6px 12px;
            border-radius: 20px;
            margin: 4px;
            font-size: 12px;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-badge:hover {
            background: #667eea;
            color: white;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h1>LogSense</h1>
            <p>Fraud Detection System</p>
        </div>

        <div class="form-group">
            <label for="userId">User ID</label>
            <input type="text" id="userId" placeholder="Enter user ID (e.g., U78901)" value="U78901">
        </div>

        <div class="form-group">
            <label for="pin">PIN</label>
            <input type="password" id="pin" placeholder="Enter PIN" value="1234" maxlength="4">
        </div>

        <button class="login-btn" id="loginBtn" onclick="login()">
            <span class="loading" id="loading"></span>
            <span id="btnText">Login</span>
        </button>

        <div class="error-message" id="errorMessage"></div>

        <div class="demo-users">
            <h3>Demo Users (click to fill)</h3>
            <div>
                <span class="user-badge" onclick="fillUser('U78901', '1234')">John Kamau (U78901)</span>
                <span class="user-badge" onclick="fillUser('U78902', '1234')">Mary Akinyi (U78902)</span>
                <span class="user-badge" onclick="fillUser('U78903', '1234')">Peter Odhiambo (U78903)</span>
            </div>
        </div>
    </div>

    <script>
        function fillUser(userId, pin) {
            document.getElementById('userId').value = userId;
            document.getElementById('pin').value = pin;
        }

        async function login() {
            const userId = document.getElementById('userId').value;
            const pin = document.getElementById('pin').value;
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            const btnText = document.getElementById('btnText');
            const errorMsg = document.getElementById('errorMessage');

            if (!userId || !pin) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Please enter User ID and PIN';
                return;
            }

            // Show loading
            loginBtn.disabled = true;
            loading.style.display = 'inline-block';
            btnText.textContent = 'Logging in...';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('http://localhost:10000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ user_id: userId, pin: pin })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store user data in session storage
                    sessionStorage.setItem('currentUser', JSON.stringify(data));
                    
                    // Redirect to dashboard
                    window.location.href = `dashboard.html?user=${userId}`;
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = data.detail || 'Login failed';
                }
            } catch (error) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Network error. Please try again.';
                console.error('Login error:', error);
            } finally {
                // Hide loading
                loginBtn.disabled = false;
                loading.style.display = 'none';
                btnText.textContent = 'Login';
            }
        }

        // Auto-login for demo (remove in production)
        window.onload = function() {
            // Check if already logged in
            const user = sessionStorage.getItem('currentUser');
            if (user) {
                const userData = JSON.parse(user);
                window.location.href = `dashboard.html?user=${userData.user_id}`;
            }
        }
    </script>
</body>
</html>
