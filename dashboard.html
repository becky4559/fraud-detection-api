<!DOCTYPE html>
<html>
<head>
    <title>LogSense - AI Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; color: #fff; padding: 40px; }
        .sidebar { width: 260px; background: #1f2833; height: 100vh; position: fixed; top:0; left:0; padding: 25px; border-right: 1px solid #45a29e; }
        .sidebar h2 { color: #66fcf1; letter-spacing: 2px; margin-bottom: 40px; font-size: 20px; }
        .sidebar a { display: block; color: #8892b0; padding: 12px; text-decoration: none; font-size: 14px; margin-bottom: 10px; border-left: 3px solid transparent; }
        .sidebar a:hover { color: #66fcf1; background: rgba(102, 252, 241, 0.05); border-left: 3px solid #66fcf1; }
        
        .content { margin-left: 280px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: #1f2833; padding: 25px; border-radius: 10px; border: 1px solid #45a29e; margin-bottom: 20px; }
        
        /* User Registration Styles */
        .user-item { background: #0b0c10; border: 1px solid #45a29e; padding: 15px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .user-info b { display: block; color: #66fcf1; font-size: 14px; }
        .user-info span { color: #8892b0; font-size: 11px; font-family: 'JetBrains Mono'; }
        .status-pill { font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        
        /* Alert Feed Styles */
        .feed-item { border-bottom: 1px solid #0b0c10; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #66fcf1; color: #0b0c10; padding: 8px 16px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 12px; border: none; cursor: pointer; }
        
        .pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #27ae60; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LOGSENSE AI</h2>
        <a href="/dashboard" style="color: #66fcf1; border-left: 3px solid #66fcf1;">Dashboard</a>
        <a href="/alerts">Alerts</a>
        <a href="/analyze-view">Forensic Lab</a>
    </div>

    <div class="content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h1>System Integrity Overview</h1>
            <div style="color: #8892b0; font-size: 13px;"><span class="pulse"></span> AI Forensic Node Active</div>
        </div>

        <div class="grid">
            <div>
                <div class="card">
                    <h3 style="margin-bottom: 15px;">Real-time Forensic Feed</h3>
                    <div id="latest-alerts">Awaiting network traffic...</div>
                </div>
            </div>

            <div>
                <div class="card">
                    <h3 style="margin-bottom: 15px;">Identity Management</h3>
                    <div id="verified-users">
                        <div class="user-item">
                            <div class="user-info">
                                <b>John Kamau (Owner)</b>
                                <span>SIG: 778899 | Trusted</span>
                            </div>
                            <div class="status-pill" style="background: rgba(39,174,96,0.2); color: #27ae60;">VERIFIED</div>
                        </div>
                    </div>
                    
                    <div id="rogue-registrations">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        async function update() {
            try {
                const res = await fetch(`${BASE_URL}/api/v2/alerts`);
                const data = await res.json();
                
                const alertContainer = document.getElementById('latest-alerts');
                const rogueContainer = document.getElementById('rogue-registrations');
                
                if (data.length > 0) {
                    // Update Forensic Feed
                    alertContainer.innerHTML = data.slice(0, 6).map(a => {
                        const isHijack = a.fraud_type === 'REGISTRATION_HIJACK' || a.user_name.toLowerCase() === 'alice';
                        return `
                            <div class="feed-item" style="${isHijack ? 'border-left: 3px solid #ff4c4c; padding-left: 12px;' : ''}">
                                <div>
                                    <b style="color:${isHijack ? '#ff4c4c' : '#66fcf1'}">${a.fraud_name}</b>
                                    <p style="color:#8892b0; font-size:12px;">Node: ${a.location} | Risk: ${a.risk_level}</p>
                                </div>
                                <a href="/analyze-view?id=${a.id}" class="btn">Analyze</a>
                            </div>
                        `;
                    }).join('');

                    // Update Rogue Identity Card
                    const aliceAlert = data.find(a => a.user_name.toLowerCase() === 'alice');
                    if (aliceAlert) {
                        rogueContainer.innerHTML = `
                            <div class="user-item" style="border-color: #ff4c4c; background: rgba(255, 76, 76, 0.05);">
                                <div class="user-info">
                                    <b style="color: #ff4c4c;">Alice (Unauthorized)</b>
                                    <span>SIG: 778899 | Hijacked Key</span>
                                </div>
                                <div class="status-pill" style="background: rgba(255,76,76,0.2); color: #ff4c4c;">BLOCKED</div>
                            </div>
                        `;
                    }
                }
            } catch (e) { console.error("Sync Error", e); }
        }

        setInterval(update, 3000);
        window.onload = update;
    </script>
</body>
</html>
