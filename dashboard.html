<!DOCTYPE html>
<html>
<head>
    <title>LogSense - AI Monitor</title>
    <style>
        /* ... (Keep your existing CSS here) ... */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; color: #fff; padding: 50px; }
        .sidebar { width: 260px; background: #1f2833; height: 100vh; position: fixed; top:0; left:0; padding: 25px; border-right: 1px solid #45a29e; }
        .sidebar h2 { color: #66fcf1; letter-spacing: 2px; margin-bottom: 40px; font-size: 20px; }
        .sidebar a { display: block; color: #8892b0; padding: 12px; text-decoration: none; font-size: 14px; margin-bottom: 10px; border-left: 3px solid transparent; }
        .sidebar a:hover { color: #66fcf1; background: rgba(102, 252, 241, 0.05); border-left: 3px solid #66fcf1; }
        .content { margin-left: 280px; }
        .card { background: #1f2833; padding: 30px; border-radius: 10px; border: 1px solid #45a29e; margin-bottom: 20px; }
        .stat-value { font-size: 48px; color: #66fcf1; font-weight: bold; }
        .btn { display: inline-block; background: #66fcf1; color: #0b0c10; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 13px; cursor: pointer; border: none; }
        .feed-item { border-bottom: 1px solid #0b0c10; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* New Style for Registration List */
        .user-badge { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #0b0c10; border-radius: 5px; margin-top: 10px; border: 1px solid #45a29e; }
        .user-name { color: #66fcf1; font-weight: bold; }
        .user-id { color: #8892b0; font-size: 12px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LOGSENSE AI</h2>
        <a href="/dashboard" style="color: #66fcf1; border-left: 3px solid #66fcf1;">Dashboard</a>
        <a href="/alerts">Alerts</a>
        <a href="/analyze-view">Forensic Lab</a>
    </div>

    <div class="content">
        <h1>System Integrity Overview</h1>
        
        <div style="display: flex; gap: 20px; margin-top: 30px;">
            <div style="flex: 2;">
                <div class="card">
                    <h3>Recent Forensic Detections</h3>
                    <div id="latest">Awaiting network traffic...</div>
                </div>
            </div>

            <div style="flex: 1;">
                <div class="card">
                    <h3 style="color: #66fcf1; margin-bottom: 15px;">Verified Registrations</h3>
                    <div id="registration-list">
                        <div class="user-badge">
                            <div>
                                <p class="user-name">John Kamau</p>
                                <p class="user-id">ID: 778899 (Active)</p>
                            </div>
                            <span style="color: #27ae60; font-size: 10px;">● TRUSTED</span>
                        </div>
                        
                        <div id="dynamic-registrations">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        async function update() {
            try {
                const res = await fetch(`${BASE_URL}/api/v2/alerts`);
                const data = await res.json();
                
                const container = document.getElementById('latest');
                const regContainer = document.getElementById('dynamic-registrations');
                
                if(data.length > 0) {
                    // Update the Alerts Feed
                    container.innerHTML = data.slice(0, 5).map(a => {
                        const isAlice = a.user_name.toLowerCase() === 'alice';
                        return `
                            <div class="feed-item" style="${isAlice ? 'border-left: 4px solid #ff4c4c; padding-left: 15px; background: rgba(255, 76, 76, 0.05);' : ''}">
                                <div>
                                    <b style="color:${isAlice ? '#ff4c4c' : '#66fcf1'};">${isAlice ? '🚨 REGISTRATION HIJACK' : a.fraud_name}</b> 
                                    <div style="color:#8892b0; font-size: 12px;">User: ${a.user_name} | Location: ${a.location}</div>
                                </div>
                                <a href="/analyze-view?id=${a.id}" class="btn" style="padding: 5px 10px; font-size: 11px;">Analyze</a>
                            </div>
                        `;
                    }).join('');

                    // Update the "Registered Users" list specifically for Alice
                    const aliceAlert = data.find(a => a.user_name.toLowerCase() === 'alice');
                    if (aliceAlert) {
                        regContainer.innerHTML = `
                            <div class="user-badge" style="border-color: #ff4c4c; background: rgba(255, 76, 76, 0.1);">
                                <div>
                                    <p class="user-name" style="color: #ff4c4c;">Alice (ROGUE)</p>
                                    <p class="user-id">ID: 778899 (Hijacked)</p>
                                </div>
                                <span style="color: #ff4c4c; font-size: 10px;">⚠️ UNVERIFIED</span>
                            </div>
                        `;
                    }
                }
            } catch (err) { console.error(err); }
        }

        setInterval(update, 3000);
        window.onload = update;
    </script>
</body>
</html>
