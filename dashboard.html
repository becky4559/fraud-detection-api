<!DOCTYPE html>
<html>
<head>
    <title>LogSense - AI Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; color: #fff; padding: 40px; }
        .sidebar { width: 260px; background: #1f2833; height: 100vh; position: fixed; top:0; left:0; padding: 25px; border-right: 1px solid #45a29e; }
        .sidebar h2 { color: #66fcf1; letter-spacing: 2px; margin-bottom: 40px; font-size: 20px; }
        .sidebar a { display: block; color: #8892b0; padding: 12px; text-decoration: none; font-size: 14px; margin-bottom: 10px; border-left: 3px solid transparent; }
        .sidebar a:hover { color: #66fcf1; background: rgba(102, 252, 241, 0.05); border-left: 3px solid #66fcf1; }
        
        /* THE CLEAR LOGS BUTTON */
        .clear-btn { margin-top: 50px; background: transparent; color: #ff4c4c; border: 1px solid #ff4c4c; padding: 10px; font-size: 11px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .clear-btn:hover { background: #ff4c4c; color: #fff; }

        .content { margin-left: 280px; }
        .grid { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 30px; }
        .card { background: #1f2833; padding: 30px; border-radius: 12px; border: 1px solid #45a29e; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .feed-item { border-bottom: 1px solid #0b0c10; padding: 25px 0; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-item { background: #0b0c10; border: 1px solid #45a29e; padding: 15px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: #8892b0; margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { width: 100%; background: #0b0c10; border: 1px solid #45a29e; padding: 12px; color: #fff; border-radius: 6px; font-size: 14px; }

        .btn { background: #66fcf1; color: #0b0c10; padding: 12px 20px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; }
        .status-pill { font-size: 11px; padding: 6px 12px; border-radius: 5px; font-weight: bold; }
        .pulse { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #27ae60; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LOGSENSE AI</h2>
        <a href="/dashboard" style="color: #66fcf1; border-left: 3px solid #66fcf1;">Dashboard</a>
        <a href="/alerts">Alerts</a>
        <a href="/analyze-view">Forensic Lab</a>
        
        <button class="clear-btn" onclick="clearLogs()">WIPE FORENSIC DATA</button>
    </div>

    <div class="content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Forensic Engine v3.0</h1>
            <div style="color: #8892b0; font-size: 14px;"><span class="pulse"></span> System Integrity Node: ACTIVE</div>
        </div>

        <div class="grid">
            <div>
                <div class="card">
                    <h2 style="margin-bottom: 20px; color: #66fcf1; border-bottom: 1px solid #45a29e; padding-bottom: 10px;">Live Forensic Analytics</h2>
                    <div id="latest-alerts">
                        <p style="color:#45a29e; font-style:italic;">Listening for anomaly signatures...</p>
                    </div>
                </div>
            </div>

            <div>
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Identity Control</h3>
                        <button class="btn" style="padding: 6px 12px; font-size: 11px;" onclick="toggleRegForm()">+ Enroll Identity</button>
                    </div>

                    <div id="registration-form" style="display: none; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 10px; border: 1px dashed #45a29e; margin-bottom: 20px;">
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="reg-name" placeholder="Alice Wangari">
                        </div>
                        <div class="input-group">
                            <label>National ID</label>
                            <input type="text" id="reg-id" placeholder="556677">
                        </div>
                        <div class="input-group">
                            <label style="color: #f1c40f;">Master Authorization Key</label>
                            <input type="password" id="admin-key" placeholder="Enter JK-Key">
                        </div>
                        <button class="btn" style="width: 100%;" onclick="enrollUser()">Authorize Identity</button>
                    </div>

                    <div id="verified-users">
                        <div class="user-item">
                            <div class="user-info">
                                <b>John Kamau (Owner)</b>
                                <span style="font-size: 10px; color: #8892b0;">SIG: 778899 | Trusted Baseline</span>
                            </div>
                            <div class="status-pill" style="background: rgba(39,174,96,0.2); color: #27ae60;">VERIFIED</div>
                        </div>
                    </div>
                    <div id="rogue-registrations"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        function toggleRegForm() {
            const form = document.getElementById('registration-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        async function enrollUser() {
            const name = document.getElementById('reg-name').value;
            const id = document.getElementById('reg-id').value;
            const key = document.getElementById('admin-key').value;

            if(key !== "JK6594") return alert("Unauthorized: Invalid Master Key.");

            try {
                await fetch(`${BASE_URL}/api/mobile/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userName: name, nationalId: id, auth_key: key })
                });
                
                document.getElementById('rogue-registrations').innerHTML += `
                    <div class="user-item" style="border-color: #66fcf1; background: rgba(102, 252, 241, 0.05);">
                        <div class="user-info"><b>${name} (Active)</b><br><span style="font-size:10px;">ID: ${id}</span></div>
                        <div class="status-pill" style="background: rgba(102, 252, 241, 0.2); color: #66fcf1;">PROVISIONED</div>
                    </div>
                `;
                toggleRegForm();
            } catch (e) { alert("Backend Error"); }
        }

        // CLEAR LOGS FUNCTION
        async function clearLogs() {
            if(confirm("DANGER: This will wipe the Forensic Log History. Proceed?")) {
                try {
                    await fetch(`${BASE_URL}/api/v2/alerts/clear`, { method: 'POST' });
                    document.getElementById('latest-alerts').innerHTML = '<p style="color:#45a29e; font-style:italic;">Logs purged. System ready.</p>';
                } catch (e) { alert("Wipe Failed"); }
            }
        }

        async function update() {
            try {
                const res = await fetch(`${BASE_URL}/api/v2/alerts`);
                const data = await res.json();
                const container = document.getElementById('latest-alerts');
                
                if (data.length > 0) {
                    container.innerHTML = data.slice(0, 5).map(a => `
                        <div class="feed-item" style="${a.risk_level === 'CRITICAL' ? 'border-left: 6px solid #ff4c4c; padding-left: 20px; background: rgba(255,76,76,0.08);' : ''}">
                            <div>
                                <b style="color:${a.risk_level === 'CRITICAL' ? '#ff4c4c' : '#66fcf1'}; font-size: 18px;">${a.fraud_name}</b>
                                <p style="font-size: 14px; margin-top: 5px;">
                                    User Identified: ${a.user_name} <br>
                                    Threat Source: ${a.location} <br>
                                    AI Confidence: ${(a.risk_score * 100).toFixed(1)}%
                                </p>
                            </div>
                            <div class="status-pill" style="color:#ff4c4c; border: 2px solid #ff4c4c;">${a.risk_level}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        setInterval(update, 3000);
        window.onload = update;
    </script>
</body>
</html>
