<!DOCTYPE html>
<html>
<head>
    <title>LogSense - AI Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; color: #fff; padding: 50px; }
        .sidebar { width: 260px; background: #1f2833; height: 100vh; position: fixed; top:0; left:0; padding: 25px; border-right: 1px solid #45a29e; }
        .sidebar h2 { color: #66fcf1; letter-spacing: 2px; margin-bottom: 40px; font-size: 20px; }
        .sidebar a { display: block; color: #8892b0; padding: 12px; text-decoration: none; font-size: 14px; margin-bottom: 10px; border-left: 3px solid transparent; }
        .sidebar a:hover { color: #66fcf1; background: rgba(102, 252, 241, 0.05); border-left: 3px solid #66fcf1; }
        
        .content { margin-left: 280px; }
        .card { background: #1f2833; padding: 30px; border-radius: 10px; border: 1px solid #45a29e; margin-bottom: 20px; transition: 0.3s; }
        .card:hover { border-color: #66fcf1; }
        
        .stat-value { font-size: 48px; color: #66fcf1; font-weight: bold; margin-top: 10px; }
        .status-badge { font-size: 12px; padding: 5px 10px; border-radius: 20px; background: rgba(39, 174, 96, 0.2); color: #27ae60; float: right; }
        
        .btn { display: inline-block; background: #66fcf1; color: #0b0c10; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; cursor: pointer; border: none; }
        .btn-outline { background: transparent; border: 1px solid #ff4c4c; color: #ff4c4c; margin-left: 10px; }
        .btn-outline:hover { background: #ff4c4c; color: #fff; }

        .feed-item { border-bottom: 1px solid #0b0c10; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .empty-text { color: #45a29e; font-style: italic; padding: 20px 0; }
        
        /* Pulse Animation for active monitoring */
        .pulse { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #27ae60; margin-right: 10px; box-shadow: 0 0 0 rgba(39, 174, 96, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(39, 174, 96, 0); } 100% { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LOGSENSE AI</h2>
        <a href="/dashboard" style="color: #66fcf1; border-left: 3px solid #66fcf1;">Dashboard</a>
        <a href="/alerts">Alerts</a>
        <a href="/analyze-view">Forensic Lab</a>
    </div>

    <div class="content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>System Integrity Overview</h1>
            <div id="connection-status" style="color: #8892b0; font-size: 14px;">
                <span class="pulse"></span>AI Engine Syncing...
            </div>
        </div>
        
        <div style="display: flex; gap: 20px;">
            <div class="card" style="flex: 1;">
                <h3>Total Anomalies</h3>
                <p id="count" class="stat-value">0</p>
            </div>
            <div class="card" style="flex: 1;">
                <h3>Engine Status</h3>
                <p class="stat-value" id="engine-status" style="color: #27ae60;">Active</p>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 20px;">Recent Forensic Detections</h3>
            <div id="latest" class="empty-text">Awaiting network traffic... (No fraud detected)</div>
        </div>

        <div style="margin-top: 20px;">
            <a href="/alerts" class="btn">View Forensic History</a>
            <button onclick="clearLogs()" class="btn btn-outline">Clear All Logs</button>
            <button onclick="update()" style="background: none; border: none; color: #45a29e; cursor: pointer; margin-left: 15px; text-decoration: underline;">Refresh Now</button>
        </div>
    </div>

    <script>
        // API Base URL - change this to your Render URL after deploying
        const BASE_URL = window.location.origin;

        async function update() {
            try {
                const res = await fetch(`${BASE_URL}/api/v2/alerts`);
                if (!res.ok) throw new Error("API Offline");
                
                const data = await res.json();
                document.getElementById('count').innerText = data.length;
                document.getElementById('connection-status').innerHTML = '<span class="pulse"></span> AI Engine Online';
                
                const container = document.getElementById('latest');
                if(data.length > 0) {
                    container.innerHTML = data.slice(0, 5).map(a => `
                        <div class="feed-item">
                            <div>
                                <b style="color:#66fcf1;">${a.fraud_name}</b> 
                                <span style="color:#8892b0; margin-left: 10px;">User: ${a.user_name} | Amount: ${a.amount}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <span style="color: ${a.risk_level === 'CRITICAL' ? '#ff4c4c' : '#f1c40f'}; font-size: 12px; font-weight: bold;">${a.risk_level}</span>
                                <a href="/analyze-view?id=${a.id}" style="color:#66fcf1; font-size: 13px; text-decoration: none;">Analyze →</a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = "Awaiting network traffic... (No fraud detected)";
                }
            } catch (err) { 
                console.error("Update failed", err);
                document.getElementById('connection-status').innerHTML = '<span style="color: #ff4c4c;">●</span> AI Engine Offline';
                document.getElementById('engine-status').style.color = "#ff4c4c";
                document.getElementById('engine-status').innerText = "Offline";
            }
        }

        async function clearLogs() {
            if(confirm("Permanently wipe all forensic logs for the new demo?")) {
                try {
                    await fetch(`${BASE_URL}/api/v2/alerts/clear`, { method: 'POST' });
                    update();
                } catch (err) { alert("Failed to clear logs."); }
            }
        }

        // Auto-refresh every 3 seconds
        setInterval(update, 3000);
        window.onload = update;
    </script>
</body>
</html>
