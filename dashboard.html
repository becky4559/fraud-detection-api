<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogSense - AI Monitor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; color: #fff; display: flex; min-height: 100vh; }
        
        /* Sidebar Navigation */
        .sidebar { width: 260px; background: #1f2833; height: 100vh; position: fixed; padding: 25px; border-right: 1px solid #45a29e; z-index: 100; }
        .sidebar h2 { color: #66fcf1; letter-spacing: 2px; margin-bottom: 40px; font-size: 20px; font-weight: 700; }
        .sidebar a { display: block; color: #8892b0; padding: 12px; text-decoration: none; font-size: 14px; margin-bottom: 10px; border-left: 3px solid transparent; transition: 0.3s; }
        .sidebar a:hover { color: #66fcf1; background: rgba(102, 252, 241, 0.05); }
        .sidebar a.active { color: #66fcf1; background: rgba(102, 252, 241, 0.05); border-left: 3px solid #66fcf1; }

        /* Clear Logs Button */
        .clear-btn { margin-top: 30px; background: transparent; color: #ff4c4c; border: 1px solid #ff4c4c; padding: 12px; font-size: 11px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .clear-btn:hover { background: #ff4c4c; color: #fff; box-shadow: 0 0 15px rgba(255, 76, 76, 0.4); }

        /* Main Content Area */
        .content { flex: 1; margin-left: 260px; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 30px; }
        
        /* Cards */
        .card { background: #1f2833; padding: 30px; border-radius: 12px; border: 1px solid rgba(69, 162, 158, 0.3); margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        /* Alerts Feed */
        .feed-item { border-bottom: 1px solid #0b0c10; padding: 20px 0; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.4s ease-out; cursor: pointer; }
        .feed-item:hover { background: rgba(102, 252, 241, 0.02); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Enrollment Styles */
        .user-item { background: #0b0c10; border: 1px solid #45a29e; padding: 15px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 10px; color: #45a29e; margin-bottom: 6px; text-transform: uppercase; font-family: 'JetBrains Mono'; }
        .input-group input { width: 100%; background: #0b0c10; border: 1px solid #45a29e; padding: 12px; color: #fff; border-radius: 6px; font-size: 14px; outline: none; }
        
        .btn { background: #66fcf1; color: #0b0c10; padding: 12px 20px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #45a29e; transform: scale(1.02); }
        
        .status-pill { font-size: 10px; padding: 5px 10px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #66fcf1; margin-right: 8px; animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h2>LOGSENSE AI</h2>
        <a href="/dashboard" class="active">Dashboard</a>
        <a href="/alerts">Alerts</a>
        <a href="/analyze-view">Forensic Lab</a>
        
        <hr style="border:0; border-top: 1px solid rgba(69,162,158,0.2); margin: 20px 0;">
        
        <button class="clear-btn" onclick="clearLogs()">Wipe Forensic Data</button>
    </nav>

    <div class="content">
        <div class="header">
            <div>
                <h1 style="font-size: 32px;">Engine Overview</h1>
                <p style="color: #45a29e; font-family: 'JetBrains Mono'; font-size: 12px;">NODE_ID: LGS-4559-PROTOTYPE</p>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 14px; color: #66fcf1;"><span class="pulse"></span>AI CORE ACTIVE</div>
                <div id="clock" style="font-family: 'JetBrains Mono'; color: #8892b0; font-size: 12px;">--:--:--</div>
            </div>
        </div>

        <div class="grid">
            <div>
                <div class="card">
                    <h3 style="color: #66fcf1; font-size: 12px; margin-bottom: 20px; letter-spacing: 2px;">LIVE FORENSIC STREAM</h3>
                    <div id="latest-alerts">
                        <p style="color:#45a29e; font-style:italic; font-size: 14px;">Awaiting anomaly signatures from network...</p>
                    </div>
                </div>
            </div>

            <div>
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="color: #66fcf1; font-size: 12px; letter-spacing: 2px;">IDENTITY CONTROL</h3>
                        <button class="btn" style="padding: 6px 12px; font-size: 11px;" onclick="toggleRegForm()">+ Enroll New</button>
                    </div>

                    <div id="registration-form" style="display: none; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 10px; border: 1px dashed #45a29e; margin-bottom: 20px;">
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="reg-name" placeholder="e.g. Alice Wangari">
                        </div>
                        <div class="input-group">
                            <label>National ID</label>
                            <input type="text" id="reg-id" placeholder="e.g. 556677">
                        </div>
                        <div class="input-group">
                            <label style="color: #f1c40f;">Master Auth Key</label>
                            <input type="password" id="admin-key" placeholder="Enter System Key">
                        </div>
                        <button class="btn" style="width: 100%;" onclick="enrollUser()">Authorize Provisioning</button>
                    </div>

                    <div id="verified-users">
                        <div class="user-item">
                            <div>
                                <b style="font-size: 14px;">John Kamau (Owner)</b><br>
                                <span style="font-size: 10px; color: #45a29e; font-family: 'JetBrains Mono';">UID: 778899 | BASELINE</span>
                            </div>
                            <div class="status-pill" style="background: rgba(39,174,96,0.2); color: #27ae60; border: 1px solid #27ae60;">VERIFIED</div>
                        </div>
                    </div>
                    <div id="rogue-registrations"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        // UI Helpers
        function toggleRegForm() {
            const form = document.getElementById('registration-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        // API: Wipe Logs
        async function clearLogs() {
            if(confirm("DANGER: Wiping logs will delete all detected anomalies. Proceed?")) {
                try {
                    const res = await fetch(`${BASE_URL}/api/v2/alerts/clear`, { method: 'POST' });
                    if(res.ok) {
                        alert("Database Purged.");
                        location.reload();
                    }
                } catch (e) { alert("Purge Failed."); }
            }
        }

        // API: Enroll Alice
        async function enrollUser() {
            const name = document.getElementById('reg-name').value;
            const id = document.getElementById('reg-id').value;
            const key = document.getElementById('admin-key').value;

            // Simple check for demo security
            if(key !== "JK6594") return alert("ACCESS DENIED: Master Key Incorrect.");

            try {
                const res = await fetch(`${BASE_URL}/api/mobile/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userName: name, nationalId: id, auth_key: key })
                });
                
                if(res.ok) {
                    document.getElementById('rogue-registrations').innerHTML += `
                        <div class="user-item" style="border-color: #66fcf1; background: rgba(102, 252, 241, 0.05);">
                            <div><b>${name}</b><br><span style="font-size:10px; color:#45a29e;">ID: ${id}</span></div>
                            <div class="status-pill" style="background: rgba(102, 252, 241, 0.2); color: #66fcf1; border: 1px solid #66fcf1;">PROVISIONED</div>
                        </div>
                    `;
                    toggleRegForm();
                }
            } catch (e) { alert("Enrollment Failed"); }
        }

        // API: Live Updates
        async function updateFeed() {
            try {
                const res = await fetch(`${BASE_URL}/api/v2/alerts`);
                const data = await res.json();
                const container = document.getElementById('latest-alerts');
                
                if (data.length > 0) {
                    container.innerHTML = data.slice(0, 5).map(a => `
                        <div class="feed-item" onclick="window.location.href='/analyze-view?id=${a.id}'" 
                             style="${a.risk_level === 'CRITICAL' ? 'border-left: 4px solid #ff4c4c; padding-left: 15px; background: rgba(255,76,76,0.05);' : ''}">
                            <div>
                                <b style="color:${a.risk_level === 'CRITICAL' ? '#ff4c4c' : '#66fcf1'}; font-size: 16px;">${a.fraud_name}</b>
                                <p style="font-size: 12px; margin-top: 4px; color: #8892b0;">
                                    Detected for: ${a.user_name} | Location: ${a.location}
                                </p>
                            </div>
                            <div class="status-pill" style="color:#ff4c4c; border: 1px solid #ff4c4c; font-size: 9px;">${a.risk_level}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        setInterval(updateFeed, 3000);
        window.onload = updateFeed;
    </script>
</body>
</html>
