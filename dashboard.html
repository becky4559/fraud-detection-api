<!DOCTYPE html>
<html>
<head>
    <title>LogSense Dashboard</title>
    <style>
        body { background: #0b0c10; color: #fff; font-family: sans-serif; padding: 50px; }
        .card { background: #1f2833; padding: 20px; border-radius: 10px; border: 1px solid #45a29e; margin-bottom: 20px; }
        .btn { display: inline-block; background: #66fcf1; color: #000; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .feed-item { border-bottom: 1px solid #0b0c10; padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <h1>LogSense AI Monitor</h1>
    <div style="display: flex; gap: 20px;">
        <div class="card" style="flex: 1;"><h3>Total Alerts</h3><p id="count" style="font-size: 40px; color: #66fcf1;">0</p></div>
        <div class="card" style="flex: 1;"><h3>System Health</h3><p style="font-size: 40px; color: #27ae60;">Active</p></div>
    </div>
    <div class="card">
        <h3>Live Alerts Stream</h3>
        <div id="latest">Monitoring for anomalies...</div>
    </div>
    <a href="/alerts" class="btn">View All History</a>
    <script>
        async function update() {
            const res = await fetch('/api/v2/alerts');
            const data = await res.json();
            document.getElementById('count').innerText = data.length;
            if(data.length > 0) {
                document.getElementById('latest').innerHTML = data.slice(0, 3).map(a => `
                    <div class="feed-item">
                        <span><b>${a.fraud_name}</b> - ${a.user_name}</span>
                        <a href="/analyze-view?id=${a.id}" style="color:#66fcf1;">Analyze →</a>
                    </div>
                `).join('');
            }
        }
        setInterval(update, 3000);
        window.onload = update;
    </script>
</body>
</html>
