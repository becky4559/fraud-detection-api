<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogSense - AI Monitor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; color: #fff; display: flex; min-height: 100vh; overflow-x: hidden; }
        
        /* Sidebar Navigation - Fixed & Solid */
        .sidebar { 
            width: 260px; 
            background: #1f2833; 
            height: 100vh; 
            position: fixed; 
            padding: 25px; 
            border-right: 1px solid #45a29e; 
            z-index: 100; 
        }
        .sidebar h2 { color: #66fcf1; letter-spacing: 2px; margin-bottom: 40px; font-size: 20px; font-weight: 700; border-bottom: 1px solid rgba(102, 252, 241, 0.2); padding-bottom: 10px; }
        .sidebar a { display: block; color: #8892b0; padding: 12px; text-decoration: none; font-size: 14px; margin-bottom: 10px; border-left: 3px solid transparent; transition: 0.3s; border-radius: 0 4px 4px 0; }
        .sidebar a:hover { color: #66fcf1; background: rgba(102, 252, 241, 0.05); }
        .sidebar a.active { color: #66fcf1; background: rgba(102, 252, 241, 0.1); border-left: 3px solid #66fcf1; }

        .clear-btn { margin-top: 30px; background: transparent; color: #ff4c4c; border: 1px solid #ff4c4c; padding: 12px; font-size: 11px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .clear-btn:hover { background: #ff4c4c; color: #fff; box-shadow: 0 0 15px rgba(255, 76, 76, 0.4); }

        /* Main Content Area - Added margin to prevent overlap */
        .content { flex: 1; margin-left: 260px; padding: 40px; background: #0b0c10; min-height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        
        /* Dashboard Cards */
        .card { background: #1f2833; padding: 25px; border-radius: 12px; border: 1px solid rgba(69, 162, 158, 0.2); margin-bottom: 25px; }
        .card h3 { color: #66fcf1; font-size: 11px; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid rgba(69, 162, 158, 0.1); padding-bottom: 10px; }
        
        /* Real-time Feed Items */
        .feed-item { 
            background: rgba(11, 12, 16, 0.5); 
            border: 1px solid rgba(69, 162, 158, 0.1);
            padding: 15px; 
            margin-bottom: 12px;
            border-radius: 8px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer;
            transition: 0.2s;
        }
        .feed-item:hover { border-color: #66fcf1; transform: translateX(5px); }

        /* Identity / Enrollment List */
        .user-item { background: #0b0c10; border-left: 3px solid #45a29e; padding: 12px; border-radius: 4px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 10px; color: #45a29e; margin-bottom: 5px; font-family: 'JetBrains Mono'; }
        .input-group input { width: 100%; background: #0b0c10; border: 1px solid #45a29e; padding: 10px; color: #fff; border-radius: 4px; outline: none; font-size: 13px; }
        
        .btn { background: #66fcf1; color: #0b0c10; padding: 10px 15px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; font-size: 12px; }
        .btn:hover { background: #45a29e; }
        
        .status-pill { font-size: 9px; padding: 3px 8px; border-radius: 3px; font-weight: bold; }
        .pulse { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #66fcf1; margin-right: 10px; animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0 rgba(102, 252, 241, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(102, 252, 241, 0); } 100% { box-shadow: 0 0 0 0 rgba(102, 252, 241, 0); } }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h2>LOGSENSE</h2>
        <a href="/dashboard" class="active">Overview Dashboard</a>
        <a href="/alerts">Incident Logs</a>
        <a href="/analyze-view">Forensic Lab</a>
        
        <hr style="border:0; border-top: 1px solid rgba(69,162,158,0.2); margin: 20px 0;">
        <button class="clear-btn" onclick="clearLogs()">Wipe Database</button>
    </nav>

    <div class="content">
        <div class="header">
            <div>
                <h1 style="font-size: 28px;">Engine Control Center</h1>
                <p style="color: #45a29e; font-family: 'JetBrains Mono'; font-size: 11px;">PROTOTYPE_MODE // ENCRYPTION_AES_256</p>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 13px; color: #66fcf1; font-weight: bold;"><span class="pulse"></span>SYSTEM MONITORING</div>
                <div id="clock" style="font-family: 'JetBrains Mono'; color: #8892b0; font-size: 12px; margin-top: 5px;">--:--:--</div>
            </div>
        </div>

        <div class="grid">
            <section>
                <div class="card">
                    <h3>Recent Anomalies Detected</h3>
                    <div id="latest-alerts">
                        <p style="color:#45a29e; font-style:italic; font-size: 13px; text-align: center; padding: 20px;">No threats in current buffer...</p>
                    </div>
                </div>
            </section>

            <aside>
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Identity Management</h3>
                        <button class="btn" onclick="toggleRegForm()">+ Enroll</button>
                    </div>

                    <div id="registration-form" style="display: none; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px dashed #45a29e; margin-bottom: 20px;">
                        <div class="input-group">
                            <label>USER NAME</label>
                            <input type="text" id="reg-name" placeholder="Alice Wangari">
                        </div>
                        <div class="input-group">
                            <label>NATIONAL ID</label>
                            <input type="text" id="reg-id" placeholder="556677">
                        </div>
                        <div class="input-group">
                            <label style="color: #f1c40f;">MASTER KEY</label>
                            <input type="password" id="admin-key" placeholder="••••••••">
                        </div>
                        <button class="btn" style="width: 100%;" onclick="enrollUser()">Verify & Enroll</button>
                    </div>

                    <div id="verified-users">
                        <div class="user-item">
                            <div>
                                <p style="font-size: 13px; font-weight: bold;">John Kamau</p>
                                <span style="font-size: 10px; color: #45a29e;">SIG: 778899 (Root)</span>
                            </div>
                            <span class="status-pill" style="color: #27ae60; border: 1px solid #27ae60;">AUTHORIZED</span>
                        </div>
                    </div>
                    <div id="rogue-registrations"></div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        function toggleRegForm() {
            const form = document.getElementById('registration-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function clearLogs() {
            if(confirm("Confirm Database Wipe?")) {
                const res = await fetch(`${BASE_URL}/api/v2/alerts/clear`, { method: 'POST' });
                if(res.ok) location.reload();
            }
        }

        async function enrollUser() {
            const name = document.getElementById('reg-name').value;
            const id = document.getElementById('reg-id').value;
            const key = document.getElementById('admin-key').value;

            if(key !== "JK6594") return alert("Unauthorized Key");

            const res = await fetch(`${BASE_URL}/api/mobile/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userName: name, nationalId: id, auth_key: key })
            });
            
            if(res.ok) {
                document.getElementById('rogue-registrations').innerHTML += `
                    <div class="user-item" style="border-color: #66fcf1;">
                        <div><p style="font-size: 13px; font-weight: bold;">${name}</p><span style="font-size:10px; color:#45a29e;">ID: ${id}</span></div>
                        <span class="status-pill" style="color: #66fcf1; border: 1px solid #66fcf1;">ENROLLED</span>
                    </div>
                `;
                toggleRegForm();
            }
        }

        async function updateFeed() {
            try {
                const res = await fetch(`${BASE_URL}/api/v2/alerts`);
                const data = await res.json();
                const container = document.getElementById('latest-alerts');
                
                if (data.length > 0) {
                    container.innerHTML = data.slice(0, 5).map(a => `
                        <div class="feed-item" onclick="window.location.href='/analyze-view?id=${a.id}'">
                            <div>
                                <p style="color:#ff4c4c; font-weight: bold; font-size: 14px;">${a.fraud_name}</p>
                                <p style="font-size: 11px; color: #8892b0; margin-top: 3px;">User: ${a.user_name} | ${a.location}</p>
                            </div>
                            <span style="font-family: monospace; color: #ff4c4c; font-size: 11px; font-weight: bold;">[${a.risk_level}]</span>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        setInterval(updateFeed, 3000);
        window.onload = updateFeed;
    </script>
</body>
</html>
