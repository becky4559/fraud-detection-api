<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogSense - All Alerts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; display: flex; color: #c5c6c7; }
        
        .sidebar { 
            width: 250px; 
            background: #1f2833; 
            height: 100vh; 
            position: fixed; 
            padding: 20px; 
            border-right: 1px solid #45a29e;
        }
        
        .sidebar h2 { color: #66fcf1; letter-spacing: 2px; margin-bottom: 30px; }
        
        .sidebar a { 
            display: block; 
            color: #8892b0; 
            padding: 12px; 
            text-decoration: none; 
            margin-bottom: 10px; 
            font-size: 14px;
            transition: 0.3s;
        }
        
        .sidebar a:hover, .sidebar a.active { 
            background: rgba(102, 252, 241, 0.05); 
            color: #66fcf1; 
            border-left: 4px solid #66fcf1; 
        }

        .main { flex: 1; margin-left: 250px; padding: 40px; }
        
        .card { 
            background: #1f2833; 
            padding: 30px; 
            border-radius: 4px; 
            border: 1px solid #45a29e; 
        }

        h1 { font-size: 24px; color: #fff; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        
        th { 
            text-align: left; 
            padding: 15px; 
            color: #66fcf1; 
            font-size: 12px; 
            text-transform: uppercase; 
            border-bottom: 1px solid #45a29e; 
        }
        
        td { 
            padding: 15px; 
            border-bottom: 1px solid #0b0c10; 
            font-size: 14px; 
            color: #c5c6c7; 
        }

        .risk-CRITICAL { color: #ff4c4c; font-weight: bold; }
        
        .btn { 
            padding: 6px 12px; 
            border: 1px solid #66fcf1; 
            color: #66fcf1; 
            text-decoration: none; 
            border-radius: 2px; 
            font-size: 11px; 
            transition: 0.3s;
        }

        .btn:hover { background: #66fcf1; color: #0b0c10; }

        .empty-msg { text-align: center; padding: 40px; color: #8892b0; font-style: italic; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LOGSENSE</h2>
        <a href="/dashboard">Surveillance Console</a>
        <a href="/alerts" class="active">Incident Logs</a>
        <a href="/" onclick="sessionStorage.clear()">Terminal Logout</a>
    </div>

    <div class="main">
        <div class="card">
            <h1>Fraud Incident Archive</h1>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>User</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Risk</th>
                        <th>Forensics</th>
                    </tr>
                </thead>
                <tbody id="alertsList">
                    </tbody>
            </table>
            <div id="noData" class="empty-msg" style="display:none;">No security incidents logged.</div>
        </div>
    </div>

    <script>
        async function loadAlerts() {
            try {
                const response = await fetch('/api/v2/alerts/recent');
                const alerts = await response.json();
                const list = document.getElementById('alertsList');
                const noData = document.getElementById('noData');
                
                if (alerts.length === 0) {
                    noData.style.display = 'block';
                    list.innerHTML = '';
                    return;
                }

                noData.style.display = 'none';
                list.innerHTML = alerts.map(a => `
                    <tr>
                        <td style="font-family: monospace;">${new Date(a.timestamp).toLocaleTimeString()}</td>
                        <td>${a.user_name}</td>
                        <td>${a.fraud_name}</td>
                        <td style="font-weight: 600;">KES ${a.amount.toLocaleString()}</td>
                        <td class="risk-${a.risk_level}">${a.risk_level}</td>
                        <td><a href="/analyze?id=${a.id}" class="btn">ANALYZE CASE</a></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Link Lost with API:", err);
            }
        }

        setInterval(loadAlerts, 3000);
        window.onload = loadAlerts;
    </script>
</body>
</html>
