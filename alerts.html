<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogSense - Incident Logs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; color: #c5c6c7; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #1f2833; height: 100vh; position: fixed; padding: 25px; border-right: 1px solid #45a29e; }
        .sidebar h2 { color: #66fcf1; letter-spacing: 3px; margin-bottom: 40px; font-size: 20px; }
        .sidebar a { display: block; color: #8892b0; padding: 12px; text-decoration: none; font-size: 14px; margin-bottom: 10px; border-left: 3px solid transparent; transition: 0.3s; }
        .sidebar a:hover { color: #66fcf1; background: rgba(102, 252, 241, 0.05); border-left: 3px solid #66fcf1; }
        .main { flex: 1; margin-left: 260px; padding: 40px; }
        .header { margin-bottom: 30px; border-bottom: 1px solid #45a29e; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .incident-card { background: #1f2833; border: 1px solid #45a29e; padding: 25px; border-radius: 4px; margin-bottom: 25px; }
        .incident-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .incident-type { color: #66fcf1; font-weight: bold; font-size: 20px; text-transform: uppercase; }
        .badge { padding: 6px 12px; border-radius: 2px; font-size: 11px; font-weight: bold; }
        .CRITICAL { background: rgba(255, 76, 76, 0.1); color: #ff4c4c; border: 1px solid #ff4c4c; }
        .HIGH { background: rgba(255, 165, 0, 0.1); color: #ffa500; border: 1px solid #ffa500; }
        .details-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; margin-top: 20px; border-top: 1px solid rgba(69, 162, 158, 0.2); padding-top: 20px; }
        .reasoning-text { color: #66fcf1; font-size: 13px; margin-bottom: 8px; }
        .btn { padding: 10px 20px; font-size: 12px; font-weight: bold; cursor: pointer; text-decoration: none; border-radius: 2px; display: inline-block; }
        .btn-investigate { border: 1px solid #66fcf1; color: #66fcf1; }
        .metadata-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #0b0c10; font-size: 13px; }
        .m-label { color: #8892b0; font-size: 11px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LOGSENSE AI</h2>
        <a href="/dashboard">Console Home</a>
        <a href="/alerts" style="color: #66fcf1; border-left: 3px solid #66fcf1;">Forensic Logs</a>
    </div>
    <div class="main">
        <div class="header">
            <div><h1>Incident Forensic Archive</h1></div>
            <div id="logCount" class="badge CRITICAL">0 INCIDENTS</div>
        </div>
        <div id="logsContainer"></div>
    </div>
    <script>
        async function loadLogs() {
            try {
                const response = await fetch('/api/v2/alerts/recent');
                const alerts = await response.json();
                const container = document.getElementById('logsContainer');
                document.getElementById('logCount').innerText = `${alerts.length} INCIDENTS`;
                
                container.innerHTML = alerts.map(a => {
                    let forensics = { explanations: ["Analysis pending..."], signals: {} };
                    try {
                        forensics = typeof a.detection_signals === 'string' ? JSON.parse(a.detection_signals) : a.detection_signals;
                    } catch(e) { console.error("Parse error", e); }

                    return `
                        <div class="incident-card">
                            <div class="incident-header">
                                <div>
                                    <span class="incident-type">${a.fraud_name || 'System Anomaly'}</span>
                                    <p style="font-size:12px; color:#45a29e;">TXN: ${a.transaction_id} | ${new Date(a.timestamp).toLocaleString()}</p>
                                </div>
                                <span class="badge ${a.risk_level}">${a.risk_level} RISK</span>
                            </div>
                            <div class="details-grid">
                                <div>
                                    <h4 style="color:#8892b0; font-size:11px; margin-bottom:10px;">AI REASONING</h4>
                                    ${forensics.explanations.map(exp => `<p class="reasoning-text">>> ${exp}</p>`).join('')}
                                </div>
                                <div>
                                    <div class="metadata-item"><span class="m-label">USER</span><span>${a.user_name}</span></div>
                                    <div class="metadata-item"><span class="m-label">AMOUNT</span><span>KES ${a.amount}</span></div>
                                    <div class="metadata-item"><span class="m-label">TARGET</span><span>${a.recipient}</span></div>
                                </div>
                            </div>
                            <div style="margin-top:20px;">
                                <a href="/analyze?id=${a.id}" class="btn btn-investigate">Open Forensic Lab</a>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) { console.error(err); }
        }
        window.onload = loadLogs;
    </script>
</body>
</html>
