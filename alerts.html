<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogSense - Incident Logs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0c10; color: #c5c6c7; display: flex; min-height: 100vh; }
        
        .sidebar { width: 250px; background: #1f2833; height: 100vh; position: fixed; padding: 25px; border-right: 1px solid #45a29e; }
        .sidebar h2 { color: #66fcf1; letter-spacing: 2px; margin-bottom: 40px; font-size: 20px; }
        .sidebar a { display: block; color: #8892b0; padding: 12px; text-decoration: none; font-size: 14px; margin-bottom: 10px; border-left: 3px solid transparent; transition: 0.3s; }
        .sidebar a:hover { color: #66fcf1; background: rgba(102, 252, 241, 0.05); border-left: 3px solid #66fcf1; }

        .main { flex: 1; margin-left: 250px; padding: 40px; }
        .header { margin-bottom: 30px; border-bottom: 1px solid #45a29e; padding-bottom: 20px; }
        
        .incident-card { background: #1f2833; border: 1px solid #45a29e; padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        .incident-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .incident-type { color: #66fcf1; font-weight: bold; font-size: 18px; }
        .timestamp { color: #8892b0; font-size: 12px; font-family: monospace; }
        
        .badge { padding: 4px 10px; border-radius: 2px; font-size: 10px; font-weight: bold; }
        .CRITICAL { background: rgba(255, 76, 76, 0.2); color: #ff4c4c; border: 1px solid #ff4c4c; }

        .details-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 15px; border-top: 1px solid #0b0c10; padding-top: 15px; }
        .reasoning-box { background: #0b0c10; padding: 15px; border-radius: 4px; }
        .reasoning-box h4 { color: #45a29e; font-size: 11px; margin-bottom: 10px; text-transform: uppercase; }
        .reasoning-text { color: #66fcf1; font-size: 13px; line-height: 1.5; }

        .metadata-list { font-size: 12px; }
        .metadata-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #0b0c10; }
        .m-label { color: #8892b0; }
        .m-value { color: #fff; font-weight: 500; }

        .actions { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(102, 252, 241, 0.1); }
        .btn-lab { color: #66fcf1; text-decoration: none; border: 1px solid #66fcf1; padding: 6px 15px; font-size: 12px; display: inline-block; transition: 0.3s; }
        .btn-lab:hover { background: #66fcf1; color: #0b0c10; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LOGSENSE</h2>
        <a href="/dashboard">Dashboard</a>
        <a href="/alerts" style="color: #66fcf1; border-left: 3px solid #66fcf1; background: rgba(102,252,241,0.05);">Incident Logs</a>
    </div>

    <div class="main">
        <div class="header">
            <h1>Incident Forensic Archive</h1>
            <p style="color: #8892b0; margin-top: 5px;">Historical log of all blocked anomalies.</p>
        </div>

        <div id="logsContainer">
            <p style="text-align: center; margin-top: 50px;">Loading historical logs...</p>
        </div>
    </div>

    <script>
        async function loadLogs() {
            try {
                const response = await fetch('/api/v2/alerts/recent');
                const alerts = await response.json();
                const container = document.getElementById('logsContainer');
                
                if (alerts.length === 0) {
                    container.innerHTML = "<p>No incidents recorded in the database.</p>";
                    return;
                }

                container.innerHTML = alerts.map(a => {
                    let forensics = { explanations: [], signals: {} };
                    try {
                        forensics = typeof a.detection_signals === 'string' ? JSON.parse(a.detection_signals) : a.detection_signals;
                    } catch(e) { console.error("Parse Error", e); }

                    return `
                        <div class="incident-card">
                            <div class="incident-header">
                                <div>
                                    <span class="incident-type">${a.fraud_name}</span>
                                    <p class="timestamp">ID: ${a.transaction_id} | ${new Date(a.timestamp).toLocaleString()}</p>
                                </div>
                                <span class="badge ${a.risk_level}">${a.risk_level}</span>
                            </div>

                            <div class="details-grid">
                                <div class="reasoning-box">
                                    <h4>Detection Reasoning</h4>
                                    ${forensics.explanations.map(exp => `<p class="reasoning-text">● ${exp}</p>`).join('')}
                                </div>
                                
                                <div class="metadata-list">
                                    <div class="metadata-item"><span class="m-label">User</span><span class="m-value">${a.user_name}</span></div>
                                    <div class="metadata-item"><span class="m-label">Amount</span><span class="m-value">KES ${a.amount}</span></div>
                                    <div class="metadata-item"><span class="m-label">Recipient</span><span class="m-value">${a.recipient}</span></div>
                                    ${Object.entries(forensics.signals).slice(0, 3).map(([key, val]) => `
                                        <div class="metadata-item">
                                            <span class="m-label">${key.replace(/_/g, ' ')}</span>
                                            <span class="m-value">${val}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="actions">
                                <a href="/analyze?id=${a.id}" class="btn-lab">Open Forensic Lab</a>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById('logsContainer').innerHTML = `<p style="color: #ff4c4c;">Failed to fetch logs: ${err.message}</p>`;
            }
        }
        window.onload = loadLogs;
    </script>
</body>
</html>
